<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hệ Thống Báo Cáo Doanh Thu Vận Hành Toàn Diện</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background-color: #f6f8fa; }
        .tab-active { border-bottom: 3px solid #10b981; color: #10b981; font-weight: 600; }
        .custom-scrollbar::-webkit-scrollbar { height: 4px; width: 4px; }
        .custom-scrollbar::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 4px; }
    </style>
</head>
<body class="p-4 text-gray-700 text-xs md:text-sm">

    <div class="bg-white p-3 rounded-xl shadow-sm border border-gray-100 flex flex-wrap gap-3 items-center justify-between mb-3">
        <div class="flex flex-wrap gap-2 items-center text-xs">
            <span class="font-medium text-gray-500">Chế độ:</span>
            <button id="btnModeDay" onclick="toggleTimeMode('day')" class="px-3 py-1.5 border border-emerald-500 bg-emerald-50 text-emerald-600 rounded-lg flex items-center gap-1 font-medium transition">
                <i class="fa-regular fa-calendar"></i> Theo ngày
            </button>
            <button id="btnModeRange" onclick="toggleTimeMode('range')" class="px-3 py-1.5 border border-gray-200 text-gray-600 rounded-lg flex items-center gap-1 hover:bg-gray-50 transition">
                <i class="fa-regular fa-calendar-days"></i> Khoảng thời gian
            </button>
            
            <div class="flex items-center gap-1.5 ml-2">
                <span class="text-gray-400">Từ</span>
                <input type="date" id="startDate" value="2026-06-02" onchange="onDateFilterChange()" class="border p-1 rounded-lg focus:outline-emerald-500 bg-gray-50 font-medium">
                <span id="lblRangeEnd" class="text-gray-400 hidden">→ Đến</span>
                <input type="date" id="endDate" value="2026-06-02" onchange="onDateFilterChange()" class="border p-1 rounded-lg focus:outline-emerald-500 bg-gray-50 font-medium hidden">
            </div>
            
            <button onclick="onDateFilterChange()" class="bg-emerald-500 hover:bg-emerald-600 text-white px-4 py-1.5 rounded-lg font-medium shadow-sm transition ml-1">Xem báo cáo</button>
            
            <div class="h-4 w-[1px] bg-gray-200 mx-1"></div>
            <button onclick="setFastDate('02')" class="px-2.5 py-1.5 border border-gray-200 rounded-lg hover:bg-gray-50 text-gray-600">Ngày 02/06</button>
            <button onclick="setFastDate('all')" class="px-2.5 py-1.5 border border-gray-200 rounded-lg hover:bg-gray-50 text-gray-600">Toàn bộ kỳ</button>
        </div>
        <div class="text-emerald-600 font-semibold text-xs md:text-sm" id="dateDisplayRange">
            02/06/2026 → 02/06/2026 <span class="text-gray-400 font-normal">(1 ngày)</span>
        </div>
    </div>

    <div class="bg-white p-3 rounded-xl shadow-sm border border-gray-100 flex flex-wrap gap-3 items-center justify-between mb-3">
        <div class="flex items-center gap-2 flex-1 max-w-md relative">
            <i class="fa-solid fa-magnifying-glass absolute left-3 text-gray-400"></i>
            <input type="text" id="searchDriver" placeholder="Tìm tài xế / nhân viên – nhập tên hoặc mã nhân viên..." oninput="renderActiveTab()" class="w-full pl-9 pr-4 py-1.5 border rounded-full bg-gray-50 focus:bg-white focus:outline-emerald-500 transition text-xs">
        </div>
        <div class="flex flex-wrap gap-1.5 text-xs">
            <button class="px-3 py-1 bg-emerald-100 text-emerald-700 rounded-full font-medium shadow-sm">Tất cả</button>
            <button class="px-3 py-1 bg-blue-50 text-blue-700 rounded-full border border-blue-100 flex items-center gap-1"><i class="fa-solid fa-user-tie"></i> NV Công ty</button>
            <button class="px-3 py-1 bg-amber-50 text-amber-700 rounded-full border border-amber-100 flex items-center gap-1"><i class="fa-solid fa-car"></i> TX RTO</button>
        </div>
    </div>

    <div class="bg-white rounded-xl shadow-sm border border-gray-100 mb-4 flex justify-between items-center px-4 overflow-x-auto custom-scrollbar">
        <div class="flex gap-5 py-3 whitespace-nowrap text-xs md:text-sm">
            <button onclick="switchTab(this, 'tong-hop')" class="flex items-center gap-1.5 text-gray-500 pb-1 hover:text-emerald-500"><i class="fa-solid fa-chart-pie"></i> Bảng tổng hợp kỳ</button>
            <button onclick="switchTab(this, 'so-sanh')" class="flex items-center gap-1.5 text-gray-500 pb-1 tab-active"><i class="fa-solid fa-users-viewfinder"></i> So sánh tổ</button>
            <button onclick="switchTab(this, 'tong-quan')" class="flex items-center gap-1.5 text-gray-500 pb-1 hover:text-emerald-500"><i class="fa-solid fa-eye"></i> Tổng quan</button>
            <button onclick="switchTab(this, 'tai-xe')" class="flex items-center gap-1.5 text-gray-500 pb-1 hover:text-emerald-500"><i class="fa-solid fa-user"></i> Tài xế</button>
            <button onclick="switchTab(this, 'xu-huong')" class="flex items-center gap-1.5 text-gray-500 pb-1 hover:text-emerald-500"><i class="fa-solid fa-arrow-trend-up"></i> Xu hướng</button>
            <button onclick="switchTab(this, 'xep-hang')" class="flex items-center gap-1.5 text-gray-500 pb-1 hover:text-emerald-500"><i class="fa-solid fa-trophy"></i> Xếp hạng</button>
            <button onclick="switchTab(this, 'canh-bao')" class="flex items-center gap-1.5 text-gray-500 pb-1 hover:text-emerald-500"><i class="fa-solid fa-triangle-exclamation"></i> Cảnh báo</button>
            <button onclick="switchTab(this, 'phuong-tien')" class="flex items-center gap-1.5 text-gray-500 pb-1 hover:text-emerald-500"><i class="fa-solid fa-car-side"></i> Phương tiện</button>
            <button onclick="switchTab(this, 'kpi')" class="flex items-center gap-1.5 text-gray-500 pb-1 hover:text-emerald-500"><i class="fa-solid fa-bullseye"></i> KPI</button>
        </div>
        
        <div class="flex gap-2 items-center py-2 pl-4 whitespace-nowrap text-xs">
            <button onclick="clearSystemData()" class="px-2.5 py-1.5 bg-red-50 text-red-600 border border-red-200 rounded-lg hover:bg-red-100 flex items-center gap-1 font-medium transition">
                <i class="fa-solid fa-trash-can"></i> Xóa bộ nhớ
            </button>
            <label class="bg-emerald-600 hover:bg-emerald-700 text-white px-4 py-1.5 rounded-lg flex items-center gap-1.5 cursor-pointer transition font-medium shadow-sm">
                <i class="fa-solid fa-file-excel text-sm"></i> Import dữ liệu
                <input type="file" id="excelFile" accept=".xlsx, .xls" class="hidden" onchange="processExcelUpload(event)">
            </label>
        </div>
    </div>

    <div id="main-content-wrapper">
        <div id="tab-so-sanh-grid" class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 xl:grid-cols-6 gap-3"></div>

        <div id="tab-dynamic-container" class="hidden bg-white p-4 rounded-xl shadow-sm border border-gray-100"></div>
    </div>

    <script>
        const teamConfigs = {
            "Tổ 01": { color: "border-emerald-600", text: "text-emerald-600", bar: "bg-emerald-600" },
            "Tổ 02": { color: "border-blue-600", text: "text-blue-600", bar: "bg-blue-600" },
            "Tổ 03": { color: "border-amber-500", text: "text-amber-500", bar: "bg-amber-500" },
            "Tổ 04": { color: "border-purple-600", text: "text-purple-600", bar: "bg-purple-600" },
            "Tổ 05": { color: "border-red-600", text: "text-red-600", bar: "bg-red-600" },
            "Tổ 06": { color: "border-sky-500", text: "text-sky-500", bar: "bg-sky-500" }
        };

        let currentActiveTabId = "so-sanh";
        let dateMode = "day"; 
        let globalDatabase = {};

        function initApplication() {
            const cache = localStorage.getItem('fleet_master_db_v4');
            if (cache) globalDatabase = JSON.parse(cache);
            onDateFilterChange();
        }

        function toggleTimeMode(mode) {
            dateMode = mode;
            const btnDay = document.getElementById('btnModeDay');
            const btnRange = document.getElementById('btnModeRange');
            const lblEnd = document.getElementById('lblRangeEnd');
            const inputEnd = document.getElementById('endDate');

            if (mode === 'day') {
                btnDay.className = "px-3 py-1.5 border border-emerald-500 bg-emerald-50 text-emerald-600 rounded-lg flex items-center gap-1 font-medium transition";
                btnRange.className = "px-3 py-1.5 border border-gray-200 text-gray-600 rounded-lg flex items-center gap-1 hover:bg-gray-50 transition";
                lblEnd.classList.add('hidden'); inputEnd.classList.add('hidden');
            } else {
                btnRange.className = "px-3 py-1.5 border border-emerald-500 bg-emerald-50 text-emerald-600 rounded-lg flex items-center gap-1 font-medium transition";
                btnDay.className = "px-3 py-1.5 border border-gray-200 text-gray-600 rounded-lg flex items-center gap-1 hover:bg-gray-50 transition";
                lblEnd.classList.remove('hidden'); inputEnd.classList.remove('hidden');
            }
            onDateFilterChange();
        }

        function onDateFilterChange() {
            const startVal = document.getElementById('startDate').value;
            let endVal = dateMode === 'day' ? startVal : document.getElementById('endDate').value;

            const d1 = new Date(startVal); const d2 = new Date(endVal);
            const totalDays = Math.ceil(Math.abs(d2 - d1) / (1000 * 60 * 60 * 24)) + 1;

            document.getElementById('dateDisplayRange').innerHTML = 
                `${startVal.split('-').reverse().join('/')} → ${endVal.split('-').reverse().join('/')} <span class="text-gray-400 font-normal">(${totalDays} ngày)</span>`;

            renderActiveTab();
        }

        function calculatePeriodData() {
            const startVal = document.getElementById('startDate').value;
            let endVal = dateMode === 'day' ? startVal : document.getElementById('endDate').value;

            let resultSummary = {};
            Object.keys(teamConfigs).forEach(tName => {
                resultSummary[tName] = { totalRevenue: 0, totalTrips: 0, driversMap: {}, activeDaysCount: 0 };
            });

            let curr = new Date(startVal);
            let stop = new Date(endVal);

            while(curr <= stop) {
                let dStr = curr.toISOString().split('T')[0];
                if (globalDatabase[dStr]) {
                    Object.keys(teamConfigs).forEach(tName => {
                        if (globalDatabase[dStr][tName]) {
                            const dayTeam = globalDatabase[dStr][tName];
                            resultSummary[tName].totalRevenue += dayTeam.revenue;
                            resultSummary[tName].totalTrips += dayTeam.trips;
                            resultSummary[tName].activeDaysCount++;

                            Object.keys(dayTeam.drivers).forEach(matai => {
                                const dr = dayTeam.drivers[matai];
                                if (!resultSummary[tName].driversMap[matai]) {
                                    resultSummary[tName].driversMap[matai] = { name: dr.name, rev: 0, trips: 0, models: {} };
                                }
                                resultSummary[tName].driversMap[matai].rev += dr.rev;
                                resultSummary[tName].driversMap[matai].trips += dr.trips;
                                if(dr.model) resultSummary[tName].driversMap[matai].models[dr.model] = (resultSummary[tName].driversMap[matai].models[dr.model] || 0) + 1;
                            });
                        }
                    });
                }
                curr.setDate(curr.getDate() + 1);
            }
            return resultSummary;
        }

        function renderActiveTab() {
            const calculatedData = calculatePeriodData();
            const searchKeyword = document.getElementById('searchDriver').value.toLowerCase().trim();
            const container = document.getElementById('tab-dynamic-container');

            if (currentActiveTabId === 'so-sanh') {
                document.getElementById('tab-so-sanh-grid').classList.remove('hidden');
                container.classList.add('hidden');
                renderSoSanhToView(calculatedData, searchKeyword);
                return;
            }

            document.getElementById('tab-so-sanh-grid').classList.add('hidden');
            container.classList.remove('hidden');

            // Tính tổng tất cả các tổ để dùng chung cho các tab phân tích
            let gTotalRev = 0, gTotalTrips = 0, allDrivers = [];
            Object.keys(calculatedData).forEach(tName => {
                gTotalRev += calculatedData[tName].totalRevenue;
                gTotalTrips += calculatedData[tName].totalTrips;
                Object.keys(calculatedData[tName].driversMap).forEach(code => {
                    allDrivers.push({
                        code: code,
                        to: tName,
                        ...calculatedData[tName].driversMap[code]
                    });
                });
            });

            if(searchKeyword) {
                allDrivers = allDrivers.filter(d => d.name.toLowerCase().includes(searchKeyword) || d.code.toString().includes(searchKeyword));
            }

            // XỬ LÝ LOGIC CHI TIẾT TỪNG TAB
            if (currentActiveTabId === 'tong-hop') {
                let rows = '';
                Object.keys(calculatedData).forEach(tName => {
                    const item = calculatedData[tName];
                    rows += `<tr class="border-b border-gray-100 hover:bg-gray-50">
                        <td class="p-2.5 font-semibold text-gray-800">${tName}</td>
                        <td class="p-2.5 text-right font-bold text-emerald-600">${item.totalRevenue.toFixed(2)}M</td>
                        <td class="p-2.5 text-right">${item.totalTrips}</td>
                        <td class="p-2.5 text-right font-medium">${Object.keys(item.driversMap).length} tài xế</td>
                        <td class="p-2.5 text-right text-gray-500">${item.totalTrips > 0 ? ((item.totalRevenue * 1000000)/item.totalTrips).toFixed(0) : 0}đ</td>
                    </tr>`;
                });
                container.innerHTML = `
                    <h3 class="text-sm md:text-base font-bold text-gray-800 mb-3"><i class="fa-solid fa-table mr-2 text-emerald-500"></i>Bảng Tổng Hợp Doanh Thu Toàn Kỳ</h3>
                    <table class="w-full text-left border-collapse">
                        <thead>
                            <tr class="bg-gray-50 text-gray-500 border-b border-gray-200">
                                <th class="p-2">Tên Đội/Tổ</th><th class="p-2 text-right">Tổng Doanh Thu</th><th class="p-2 text-right">Số Cuốc Chuyến</th><th class="p-2 text-right">Số Nhân Sự Chạy</th><th class="p-2 text-right">Hiệu Suất/Cuốc</th>
                            </tr>
                        </thead>
                        <tbody>${rows || '<tr><td colspan="5" class="text-center p-4 text-gray-400">Chưa có dữ liệu</td></tr>'}</tbody>
                    </table>`;
            } 
            else if (currentActiveTabId === 'tong-quan') {
                container.innerHTML = `
                    <h3 class="text-sm md:text-base font-bold text-gray-800 mb-4"><i class="fa-solid fa-chart-line mr-2 text-emerald-500"></i>Chỉ Số Vận Hành Trọng Yếu (KPI Tổng Chi Nhánh)</h3>
                    <div class="grid grid-cols-1 sm:grid-cols-3 gap-4">
                        <div class="bg-emerald-50 border border-emerald-100 p-4 rounded-xl">
                            <span class="text-gray-500 block font-medium">Doanh Số Tổng Cộng</span>
                            <span class="text-2xl font-black text-emerald-700">${gTotalRev.toFixed(2)}M</span>
                        </div>
                        <div class="bg-blue-50 border border-blue-100 p-4 rounded-xl">
                            <span class="text-gray-500 block font-medium">Tổng Số Cuốc Hoàn Thành</span>
                            <span class="text-2xl font-black text-blue-700">${gTotalTrips} cuốc</span>
                        </div>
                        <div class="bg-purple-50 border border-purple-100 p-4 rounded-xl">
                            <span class="text-gray-500 block font-medium">Tổng Nhân Sự Hoạt Động</span>
                            <span class="text-2xl font-black text-purple-700">${allDrivers.length} nhân sự</span>
                        </div>
                    </div>`;
            }
            else if (currentActiveTabId === 'tai-xe') {
                let rows = '';
                allDrivers.sort((a,b) => b.rev - a.rev).forEach((d, idx) => {
                    rows += `<tr class="border-b border-gray-100 text-xs hover:bg-gray-50">
                        <td class="p-2 text-gray-400">${idx+1}</td>
                        <td class="p-2 font-bold">${d.code}</td>
                        <td class="p-2 font-medium text-gray-800">${d.name}</td>
                        <td class="p-2 text-gray-500">${d.to}</td>
                        <td class="p-2 text-right font-semibold text-emerald-600">${d.rev.toFixed(2)}M</td>
                        <td class="p-2 text-right">${d.trips}</td>
                    </tr>`;
                });
                container.innerHTML = `
                    <h3 class="text-sm md:text-base font-bold text-gray-800 mb-3"><i class="fa-solid fa-user-group mr-2 text-emerald-500"></i>Danh Sách Tra Cứu Nhân Sự</h3>
                    <div class="max-h-96 overflow-y-auto custom-scrollbar">
                        <table class="w-full text-left">
                            <thead class="sticky top-0 bg-gray-50 text-gray-500">
                                <tr><th class="p-2">STT</th><th class="p-2">Mã Tài Xế</th><th class="p-2">Họ Tên</th><th class="p-2">Đội Quản Lý</th><th class="p-2 text-right">Doanh Số</th><th class="p-2 text-right">Cuốc Xe</th></tr>
                            </thead>
                            <tbody>${rows || '<tr><td colspan="6" class="text-center p-4">Không tìm thấy nhân viên nào</td></tr>'}</tbody>
                        </table>
                    </div>`;
            }
            else if (currentActiveTabId === 'xu-huong') {
                let trendHtml = '';
                Object.keys(globalDatabase).sort().forEach(date => {
                    let dayTotal = 0;
                    Object.keys(globalDatabase[date]).forEach(t => dayTotal += globalDatabase[date][t].revenue);
                    let barWidth = Math.min(100, (dayTotal * 5));
                    trendHtml += `
                        <div class="flex items-center gap-3 text-xs">
                            <span class="w-20 font-medium text-gray-600">${date.split('-').reverse().slice(0,2).join('/')}</span>
                            <div class="flex-1 bg-gray-100 h-5 rounded-md overflow-hidden relative">
                                <div class="bg-emerald-500 h-full transition-all" style="width: ${barWidth}%"></div>
                                <span class="absolute left-2 top-0.5 text-[10px] font-bold text-gray-800">${dayTotal.toFixed(2)}M</span>
                            </div>
                        </div>`;
                });
                container.innerHTML = `
                    <h3 class="text-sm md:text-base font-bold text-gray-800 mb-3"><i class="fa-solid fa-chart-column mr-2 text-emerald-500"></i>Biểu Đồ Biến Động Doanh Thu Theo Ngày</h3>
                    <div class="space-y-2 p-2 bg-gray-50 rounded-xl">${trendHtml || '<p class="text-center p-4 text-gray-400">Hãy import thêm nhiều ngày để thấy đồ thị xu hướng</p>'}</div>`;
            }
            else if (currentActiveTabId === 'xep-hang') {
                let topTeams = Object.keys(calculatedData).map(t => ({name: t, rev: calculatedData[t].totalRevenue}));
                topTeams.sort((a,b) => b.rev - a.rev);
                let rankingRows = '';
                topTeams.forEach((t, i) => {
                    let medal = i===0 ? '🥇' : (i===1 ? '🥈' : (i===2 ? '🥉' : i+1));
                    rankingRows += `<div class="flex justify-between items-center p-2 bg-gray-50 rounded-lg">
                        <span class="font-bold">${medal} ${t.name}</span>
                        <span class="font-extrabold text-emerald-600 text-sm">${t.rev.toFixed(2)}M</span>
                    </div>`;
                });
                container.innerHTML = `
                    <h3 class="text-sm md:text-base font-bold text-gray-800 mb-3"><i class="fa-solid fa-trophy mr-2 text-amber-500"></i>Bảng Xếp Hạng Doanh Thu Các Đội Đua Top</h3>
                    <div class="space-y-2 max-w-md">${rankingRows || '<p class="text-gray-400">Chưa có bảng xếp hạng</p>'}</div>`;
            }
            else if (currentActiveTabId === 'canh-bao') {
                let alerts = '';
                allDrivers.forEach(d => {
                    if(d.rev > 0 && d.rev < 0.3) { // Doanh thu thấp hơn 300K trong kỳ lọc
                        alerts += `<div class="p-2.5 bg-rose-50 border border-rose-100 text-rose-800 rounded-lg flex justify-between items-center text-xs">
                            <div><i class="fa-solid fa-triangle-exclamation mr-1"></i> Tài xế <span class="font-bold">${d.name} (${d.code})</span> thuộc <span class="font-medium">${d.to}</span> đạt hiệu suất thấp.</div>
                            <span class="font-bold bg-rose-200 px-2 py-0.5 rounded">${d.rev.toFixed(2)}M</span>
                        </div>`;
                    }
                });
                container.innerHTML = `
                    <h3 class="text-sm md:text-base font-bold text-gray-800 mb-3"><i class="fa-solid fa-bell mr-2 text-rose-500"></i>Cảnh Báo Nhân Sự Dưới Sàn Hiệu Suất (&lt;300K)</h3>
                    <div class="space-y-2 max-h-80 overflow-y-auto custom-scrollbar">${alerts || '<div class="text-emerald-600 font-medium p-4 text-center bg-emerald-50 rounded-lg"><i class="fa-solid fa-circle-check mr-1"></i> Tuyệt vời! Không có tài xế nào bị cảnh báo hiệu suất thấp trong kỳ này.</div>'}</div>`;
            }
            else if (currentActiveTabId === 'phuong-tien') {
                let totalModelTrips = {}, modelRevenue = {};
                // Đếm dữ liệu phương tiện thô sơ từ file
                allDrivers.forEach(d => {
                    modelRevenue["Dòng Xe"] = (modelRevenue["Dòng Xe"] || 0) + d.rev;
                    totalModelTrips["Dòng Xe"] = (totalModelTrips["Dòng Xe"] || 0) + d.trips;
                });
                container.innerHTML = `
                    <h3 class="text-sm md:text-base font-bold text-gray-800 mb-3"><i class="fa-solid fa-car-side mr-2 text-blue-500"></i>Thống Kê Doanh Thu Theo Nhóm Phương Tiện</h3>
                    <div class="p-4 bg-gray-50 rounded-xl max-w-sm flex justify-between items-center">
                        <div>
                            <span class="font-bold text-gray-800 text-sm block">Đội Xe Thuần Điện (VF)</span>
                            <span class="text-xs text-gray-400">${gTotalTrips} chuyến đi an toàn</span>
                        </div>
                        <span class="text-base font-black text-blue-600">${gTotalRev.toFixed(2)}M</span>
                    </div>`;
            }
            else if (currentActiveTabId === 'kpi') {
                let targetKPI = 2.0; // Định mức thử nghiệm 2.0M mỗi tổ
                let kpiHtml = '';
                Object.keys(calculatedData).forEach(tName => {
                    let rev = calculatedData[tName].totalRevenue;
                    let pct = Math.min(100, (rev / targetKPI) * 100);
                    let color = pct >= 100 ? 'bg-emerald-500' : (pct >= 50 ? 'bg-amber-500' : 'bg-red-500');
                    kpiHtml += `<div class="space-y-1">
                        <div class="flex justify-between text-xs font-medium">
                            <span>${tName} (Chỉ tiêu: ${targetKPI}M)</span>
                            <span class="font-bold">${pct.toFixed(1)}% đạt được</span>
                        </div>
                        <div class="w-full bg-gray-100 h-3 rounded-full overflow-hidden">
                            <div class="${color} h-full transition-all" style="width: ${pct}%"></div>
                        </div>
                    </div>`;
                });
                container.innerHTML = `
                    <h3 class="text-sm md:text-base font-bold text-gray-800 mb-3"><i class="fa-solid fa-bullseye mr-2 text-purple-500"></i>Tiến Độ Hoàn Thành Chỉ Tiêu Thử Nghiệm Kế Hoạch</h3>
                    <div class="space-y-4 bg-gray-50 p-4 rounded-xl">${kpiHtml}</div>`;
            }
        }

        function renderSoSanhToView(aggregatedData, searchKeyword) {
            const grid = document.getElementById('tab-so-sanh-grid');
            grid.innerHTML = '';

            Object.keys(aggregatedData).forEach(tName => {
                const item = aggregatedData[tName]; const conf = teamConfigs[tName];

                let driverArray = Object.keys(item.driversMap).map(id => ({
                    code: id, name: item.driversMap[id].name, rev: item.driversMap[id].rev, trips: item.driversMap[id].trips
                }));

                let filteredDrivers = driverArray.filter(d => d.name.toLowerCase().includes(searchKeyword) || d.code.toString().includes(searchKeyword));
                filteredDrivers.sort((a, b) => b.rev - a.rev);
                let displayTopDrivers = filteredDrivers.slice(0, 4);

                let driverListHtml = '';
                displayTopDrivers.forEach(d => {
                    driverListHtml += `
                        <div class="flex justify-between items-center py-1 border-b border-gray-50 hover:bg-gray-50 transition">
                            <div class="truncate max-w-[125px]">
                                <span class="text-gray-800 font-medium block truncate">${d.name}</span>
                                <span class="text-gray-400 text-[10px] block">${d.code}</span>
                            </div>
                            <div class="text-right">
                                <span class="${conf.text} font-bold">${d.rev.toFixed(2)}M</span>
                                <span class="text-[9px] text-gray-400 block">${d.trips} cuốc</span>
                            </div>
                        </div>`;
                });

                const countActiveDrivers = driverArray.length;
                const daysDivisor = Math.max(1, item.activeDaysCount / 6);
                const avgDayPerDriver = countActiveDrivers > 0 ? ((item.totalRevenue * 1000000) / countActiveDrivers / daysDivisor) : 0;
                const avgPeriodPerDriver = countActiveDrivers > 0 ? (item.totalRevenue / countActiveDrivers) : 0;
                const avgDayStr = avgDayPerDriver >= 1000 ? (avgDayPerDriver / 1000).toFixed(0) + "K" : avgDayPerDriver.toFixed(0);

                grid.innerHTML += `
                    <div class="bg-white rounded-xl shadow-sm border-t-4 ${conf.color} border-x border-b border-gray-200 flex flex-col justify-between p-3 transition transform hover:-translate-y-0.5">
                        <div>
                            <div class="flex justify-between items-center mb-2.5">
                                <h3 class="font-bold text-sm md:text-base ${conf.text}">${tName}</h3>
                                <span class="text-[10px] text-gray-500 bg-gray-100 font-medium px-2 py-0.5 rounded-md">${countActiveDrivers} TX chạy</span>
                            </div>
                            <div class="space-y-1.5 text-xs text-gray-500 mb-2.5">
                                <div class="flex justify-between"><span>Tổng DT kỳ</span><span class="font-bold text-gray-900 text-sm">${item.totalRevenue.toFixed(2)}M</span></div>
                                <div class="flex justify-between pt-1 border-t border-dashed border-gray-100"><span>TB DT/TX/ngày</span><span class="font-bold text-gray-800">${avgDayStr}</span></div>
                                <div class="flex justify-between"><span>TB DT/TX cả kỳ</span><span class="font-bold text-gray-800">${avgPeriodPerDriver.toFixed(2)}M</span></div>
                            </div>
                            <div class="h-[2px] w-full ${conf.bar} opacity-60 mb-2.5"></div>
                            <div class="space-y-1">${driverListHtml || '<p class="text-gray-400 text-center py-4 text-xs">Không tìm thấy tài xế</p>'}</div>
                        </div>
                    </div>`;
            });
        }

        function processExcelUpload(event) {
            const file = event.target.files[0];
            if (!file) return;

            const reader = new FileReader();
            reader.onload = function(e) {
                const data = new Uint8Array(e.target.result);
                const workbook = XLSX.read(data, { type: 'array' });
                const worksheet = workbook.Sheets[workbook.SheetNames[0]];
                const rawJsonRows = XLSX.utils.sheet_to_json(worksheet);

                if (rawJsonRows.length === 0) return alert("File Excel trống dữ liệu!");

                let parseSuccessCount = 0;
                rawJsonRows.forEach(row => {
                    let origDate = row["Ngày phân công"] || row["Ngay"] || row["Bắt đầu ca"];
                    if (!origDate) return;

                    let targetDateKey = "";
                    let dStr = origDate.toString().trim().split(" ")[0];
                    let parts = dStr.split("/");
                    
                    if (parts.length === 3) {
                        targetDateKey = `${parts[2]}-${parts[1].padStart(2,'0')}-${parts[0].padStart(2,'0')}`;
                    } else {
                        let dashParts = dStr.split("-");
                        if (dashParts.length === 3) {
                            targetDateKey = dashParts[0].length === 4 ? dStr : `${dashParts[2]}-${dashParts[1].padStart(2,'0')}-${dashParts[0].padStart(2,'0')}`;
                        }
                    }

                    if (!targetDateKey || targetDateKey.includes("undefined")) return;

                    let origTo = row["Tổ"] || row["To"]; if (!origTo) return;
                    let toKeyName = "";
                    let splitParts = origTo.toString().split(".");
                    if (splitParts.length > 0) {
                        let lastChunk = splitParts[splitParts.length - 1];
                        let numMatch = lastChunk.match(/(\d+)/);
                        if (numMatch) toKeyName = "Tổ " + numMatch[1].padStart(2, '0');
                    }

                    if (!toKeyName || !teamConfigs[toKeyName]) return;

                    let origRevenue = row["Doanh số"] || row["Tổng giá trị cước xe hoàn thành"] || 0;
                    let numRevenue = parseFloat(origRevenue.toString().replace(/[^0-9.-]/g, '')) || 0;
                    let convertedMillion = numRevenue / 1000000;

                    let driverCode = row["Mã tài xế"] || row["Mã tài"];
                    let driverName = row["Tên tài xế"] || "Tài xế ẩn";
                    let countTrips = parseInt(row["Số cuốc xe hoàn thành"] || row["Số cuốc xe"]) || 0;

                    if (!driverCode) return;

                    if (!globalDatabase[targetDateKey]) globalDatabase[targetDateKey] = {};
                    if (!globalDatabase[targetDateKey][toKeyName]) {
                        globalDatabase[targetDateKey][toKeyName] = { revenue: 0, trips: 0, drivers: {} };
                    }

                    globalDatabase[targetDateKey][toKeyName].revenue += convertedMillion;
                    globalDatabase[targetDateKey][toKeyName].trips += countTrips;

                    if (!globalDatabase[targetDateKey][toKeyName].drivers[driverCode]) {
                        globalDatabase[targetDateKey][toKeyName].drivers[driverCode] = { name: driverName, rev: 0, trips: 0, model: row["Model"] };
                    }
                    globalDatabase[targetDateKey][toKeyName].drivers[driverCode].rev += convertedMillion;
                    globalDatabase[targetDateKey][toKeyName].drivers[driverCode].trips += countTrips;
                    parseSuccessCount++;
                });

                localStorage.setItem('fleet_master_db_v4', JSON.stringify(globalDatabase));
                
                if (rawJsonRows.length > 0) {
                    let firstRowDate = rawJsonRows[0]["Ngày phân công"] || rawJsonRows[0]["Bắt đầu ca"];
                    if (firstRowDate) {
                        let bits = firstRowDate.toString().trim().split(" ")[0].split("/");
                        if(bits.length === 3) {
                            let extractedDate = `${bits[2]}-${bits[1].padStart(2,'0')}-${bits[0].padStart(2,'0')}`;
                            document.getElementById('startDate').value = extractedDate;
                            document.getElementById('endDate').value = extractedDate;
                        }
                    }
                }
                onDateFilterChange();
                alert(`Import thành công! Đã xử lý và lưu trữ dữ liệu của ${parseSuccessCount} chuyến xe vào hệ thống.`);
                event.target.value = '';
            };
            reader.readAsArrayBuffer(file);
        }

        function switchTab(buttonElement, tabId) {
            currentActiveTabId = tabId;
            document.querySelectorAll('.tab-active').forEach(el => { el.classList.remove('tab-active'); el.classList.add('text-gray-500'); });
            buttonElement.classList.add('tab-active'); buttonElement.classList.remove('text-gray-500');
            renderActiveTab();
        }

        function setFastDate(type) {
            if (type === '02') {
                document.getElementById('startDate').value = "2026-06-02";
                document.getElementById('endDate').value = "2026-06-02";
            } else if (type === 'all') {
                document.getElementById('startDate').value = "2026-05-01";
                document.getElementById('endDate').value = "2026-06-30";
            }
            onDateFilterChange();
        }

        function clearSystemData() {
            if (confirm("Xóa toàn bộ kho dữ liệu đã tích lũy?")) {
                localStorage.removeItem('fleet_master_db_v4'); globalDatabase = {}; renderActiveTab();
            }
        }

        window.onload = initApplication;
    </script>
</body>
</html>
