<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Quản Lý Doanh Số GSM Các Tổ</title>
    <script src="https://cdn.jsdelivr.net/npm/xlsx@0.18.5/dist/xlsx.full.min.js"></script>
    <style>
        :root {
            --gsm-primary: #00b4d8;
            --gsm-teal: #00a896;
            --gsm-dark: #028090;
            --bg-color: #f4f7f6;
            --text-color: #2d3748;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background-color: var(--bg-color);
            margin: 0;
            padding: 20px;
            color: var(--text-color);
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
            background: #ffffff;
            padding: 25px;
            border-radius: 12px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.05);
        }

        h1 {
            font-size: 24px;
            color: var(--gsm-dark);
            margin-top: 0;
            margin-bottom: 20px;
            font-weight: 700;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        /* Thanh điều khiển ngang giống y hệt ảnh phối cảnh */
        .filter-bar {
            display: flex;
            flex-wrap: wrap;
            gap: 12px;
            align-items: center;
            background: #ffffff;
            padding: 15px 0;
            border-bottom: 1px solid #e2e8f0;
            margin-bottom: 25px;
        }

        .filter-group {
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .filter-group label {
            font-size: 14px;
            font-weight: 600;
            color: #4a5568;
            white-space: nowrap;
        }

        input[type="date"], select, input[type="text"] {
            padding: 8px 12px;
            border: 1px solid #cbd5e0;
            border-radius: 6px;
            font-size: 14px;
            outline: none;
            transition: border-color 0.2s;
            min-width: 160px;
        }

        input:focus, select:focus {
            border-color: var(--gsm-teal);
        }

        /* Nút bấm đồng bộ phong cách */
        .btn-wrapper {
            display: flex;
            gap: 8px;
            margin-left: auto; /* Đẩy cụm nút bấm về bên phải */
        }

        .btn {
            padding: 8px 16px;
            font-size: 14px;
            font-weight: 600;
            border-radius: 6px;
            cursor: pointer;
            border: none;
            transition: all 0.2s;
            display: inline-flex;
            align-items: center;
            gap: 6px;
        }

        .btn-upload {
            background-color: var(--gsm-teal);
            color: white;
            position: relative;
            overflow: hidden;
        }

        .btn-upload input[type="file"] {
            position: absolute;
            left: 0; top: 0; opacity: 0;
            cursor: pointer; height: 100%; width: 100%;
        }

        .btn-upload:hover { background-color: #02c39a; }

        .btn-danger {
            background-color: #fff1f0;
            color: #e53e3e;
            border: 1px solid #ffa39e;
        }

        .btn-danger:hover {
            background-color: #e53e3e;
            color: white;
        }

        /* Khối hiển thị các con số tổng số chỉ số */
        .summary-cards {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(240px, 1fr));
            gap: 20px;
            margin-bottom: 25px;
        }

        .card {
            background: #f8fafc;
            border: 1px solid #e2e8f0;
            padding: 18px;
            border-radius: 8px;
            text-align: left;
        }

        .card h3 {
            margin: 0 0 8px 0;
            font-size: 13px;
            color: #718096;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .card .value {
            font-size: 22px;
            font-weight: 700;
            color: var(--gsm-dark);
        }

        /* Giao diện Bảng hiển thị dữ liệu */
        .table-container {
            overflow-x: auto;
            border: 1px solid #e2e8f0;
            border-radius: 8px;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            text-align: left;
        }

        th {
            background-color: #f1f5f9;
            color: #4a5568;
            font-weight: 600;
            padding: 12px 16px;
            font-size: 14px;
            border-bottom: 2px solid #e2e8f0;
        }

        td {
            padding: 14px 16px;
            border-bottom: 1px solid #edf2f7;
            font-size: 14px;
            color: #2d3748;
        }

        tr:hover td {
            background-color: #f8fafc;
        }

        .text-right { text-align: right; }
        .text-center { text-align: center; }

        .no-data {
            text-align: center;
            padding: 40px;
            color: #a0aec0;
            font-style: italic;
        }

        @media (max-width: 900px) {
            .filter-bar { flex-direction: column; align-items: flex-start; }
            .btn-wrapper { margin-left: 0; width: 100%; justify-content: flex-start; }
        }
    </style>
</head>
<body>

<div class="container">
    <h1>📊 Quản Lý Doanh Số Các Tổ Hoạt Động</h1>

    <div class="filter-bar">
        <div class="filter-group">
            <label>Lọc theo ngày:</label>
            <select id="dateSelect" onchange="renderData()">
                <option value="all">-- Tất cả ngày --</option>
            </select>
        </div>

        <div class="filter-group">
            <label>Tìm kiếm tổ:</label>
            <input type="text" id="searchTeam" placeholder="Nhập tên tổ cần tìm..." oninput="renderData()" />
        </div>

        <div class="btn-wrapper">
            <button class="btn btn-upload">
                📥 Import Excel Cộng Dồn
                <input type="file" id="excelFile" accept=".xlsx, .xls" />
            </button>
            <button class="btn btn-danger" onclick="clearData()">🗑️ Xóa toàn bộ dữ liệu</button>
        </div>
    </div>

    <div class="summary-cards">
        <div class="card">
            <h3>Tổng số tổ hoạt động</h3>
            <div class="value" id="totalTeams">0</div>
        </div>
        <div class="card">
            <h3>Tổng số cuốc hoàn thành</h3>
            <div class="value" id="totalTrips">0</div>
        </div>
        <div class="card" style="border-left: 4px solid var(--gsm-teal);">
            <h3>Tổng doanh số thu về</h3>
            <div class="value" style="color: var(--gsm-teal);" id="totalSales">0 đ</div>
        </div>
    </div>

    <div class="table-container">
        <table>
            <thead>
                <tr>
                    <th style="width: 60px;" class="text-center">STT</th>
                    <th>Tên Tổ / Khu Vực</th>
                    <th class="text-center">Số lượng tài xế</th>
                    <th class="text-right">Tổng số cuốc chạy</th>
                    <th class="text-right">Tổng doanh số tích lũy</th>
                </tr>
            </thead>
            <tbody id="dataTableBody">
                </tbody>
        </table>
        <div id="noDataText" class="no-data">Hệ thống trống. Hãy nhấn nút "Import Excel" phía trên để nạp dữ liệu.</div>
    </div>
</div>

<script>
    // Khởi tạo cơ sở dữ liệu từ bộ nhớ trình duyệt localStorage (Đảm bảo reload / F5 không mất)
    let gsmDatabase = JSON.parse(localStorage.getItem('gsm_master_db')) || [];

    // Hàm format số tiền VND thân thiện
    function formatMoney(amount) {
        return new Intl.NumberFormat('vi-VN').format(amount) + ' đ';
    }

    // Cập nhật danh sách các Ngày vào ô chọn lọc Dropdown
    function populateDateDropdown() {
        const dateSelect = document.getElementById('dateSelect');
        const prevValue = dateSelect.value;
        
        // Lấy danh sách ngày duy nhất
        const uniqueDates = [...new Set(gsmDatabase.map(item => item.ngay))].sort();

        dateSelect.innerHTML = '<option value="all">-- Tất cả ngày --</option>';
        uniqueDates.forEach(date => {
            const opt = document.createElement('option');
            opt.value = date;
            opt.innerText = date;
            dateSelect.appendChild(opt);
        });

        if (uniqueDates.includes(prevValue)) {
            dateSelect.value = prevValue;
        }
    }

    // Hàm xử lý hiển thị dữ liệu & Lọc dữ liệu theo mong muốn
    function renderData() {
        const selectedDate = document.getElementById('dateSelect').value;
        const searchQuery = document.getElementById('searchTeam').value.trim().toLowerCase();
        const tbody = document.getElementById('dataTableBody');
        const noDataText = document.getElementById('noDataText');

        tbody.innerHTML = '';

        // 1. Lọc theo ngày
        let filtered = gsmDatabase;
        if (selectedDate !== 'all') {
            filtered = gsmDatabase.filter(item => item.ngay === selectedDate);
        }

        // 2. Lọc theo ô tìm kiếm tên tổ
        if (searchQuery !== '') {
            filtered = filtered.filter(item => item.khuVuc.toLowerCase().includes(searchQuery));
        }

        if (filtered.length === 0) {
            noDataText.style.display = 'block';
            document.getElementById('totalTeams').innerText = '0';
            document.getElementById('totalTrips').innerText = '0';
            document.getElementById('totalSales').innerText = '0 đ';
            return;
        }

        noDataText.style.display = 'none';

        // 3. Gom nhóm dữ liệu tích lũy/cộng dồn theo Tên tổ (Khu vực)
        let teamGroup = {};
        let summarySales = 0;
        let summaryTrips = 0;

        filtered.forEach(record => {
            const team = record.khuVuc;
            if (!teamGroup[team]) {
                teamGroup[team] = {
                    sales: 0,
                    trips: 0,
                    drivers: new Set()
                };
            }
            teamGroup[team].sales += record.doanhSo;
            teamGroup[team].trips += record.cuocXe;
            if (record.taiXe) teamGroup[team].drivers.add(record.taiXe);

            summarySales += record.doanhSo;
            summaryTrips += record.cuocXe;
        });

        // 4. In dữ liệu ra bảng bảng biểu
        const sortedTeams = Object.keys(teamGroup).sort();
        let idx = 1;

        sortedTeams.forEach(name => {
            const data = teamGroup[name];
            const row = document.createElement('tr');
            row.innerHTML = `
                <td class="text-center" style="color: #a0aec0;">${idx++}</td>
                <td style="font-weight: 600;">${name}</td>
                <td class="text-center">${data.drivers.size} xế</td>
                <td class="text-right">${data.trips.toLocaleString('vi-VN')}</td>
                <td class="text-right" style="color: var(--gsm-dark); font-weight: 700;">${formatMoney(data.sales)}</td>
            `;
            tbody.appendChild(row);
        });

        // 5. Đồng bộ hiển thị lên thẻ chỉ số thông minh
        document.getElementById('totalTeams').innerText = sortedTeams.length;
        document.getElementById('totalTrips').innerText = summaryTrips.toLocaleString('vi-VN');
        document.getElementById('totalSales').innerText = formatMoney(summarySales);
    }

    // Đọc file Excel tải lên
    document.getElementById('excelFile').addEventListener('change', function(e) {
        const file = e.target.files[0];
        if (!file) return;

        const reader = new FileReader();
        reader.onload = function(evt) {
            try {
                const data = evt.target.result;
                const workbook = XLSX.read(data, { type: 'binary' });
                const worksheet = workbook.Sheets[workbook.SheetNames[0]];
                const jsonData = XLSX.utils.sheet_to_json(worksheet);

                if (jsonData.length === 0) {
                    alert("File Excel trống dữ liệu!");
                    return;
                }

                jsonData.forEach(row => {
                    let khuVuc = "CHƯA PHÂN TỔ";
                    let ngayPhanCong = "Không rõ";
                    let doanhSo = 0;
                    let soCuoc = 0;
                    let maTaiXe = "";

                    // Đọc ánh xạ thông minh dựa trên dữ liệu thật của file đối soát GSM của bạn
                    for (let key in row) {
                        let k = key.toLowerCase().trim();
                        if (k === 'khu vực' || k === 'khuvuc' || k === 'tổ' || k === 'bộ phận') {
                            khuVuc = row[key].toString().trim().toUpperCase() || "CHƯA PHÂN TỔ";
                        } else if (k === 'ngày phân công' || k === 'ngayphancong' || k === 'ngày') {
                            ngayPhanCong = row[key].toString().trim();
                        } else if (k === 'doanh số' || k === 'doanhso' || k === 'tổng giá trị cuốc xe') {
                            doanhSo = parseFloat(row[key]) || 0;
                        } else if (k === 'số cuốc xe hoàn thành' || k === 'số cuốc hoàn thành' || k === 'số cuốc') {
                            soCuoc = parseInt(row[key]) || 0;
                        } else if (k === 'mã tài xế' || k === 'mataixe' || k === 'mã tx') {
                            maTaiXe = row[key].toString().trim();
                        }
                    }

                    gsmDatabase.push({
                        khuVuc: khuVuc,
                        ngay: ngayPhanCong,
                        doanhSo: doanhSo,
                        cuocXe: soCuoc,
                        taiXe: maTaiXe
                    });
                });

                // Lưu cơ sở dữ liệu vào localStorage
                localStorage.setItem('gsm_master_db', JSON.stringify(gsmDatabase));
                
                populateDateDropdown();
                renderData();
                alert("Đã import và cộng dồn dữ liệu mới thành công!");
                document.getElementById('excelFile').value = "";

            } catch (err) {
                console.error(err);
                alert("Lỗi cấu trúc khi đọc file. Vui lòng thử lại.");
            }
        };
        reader.readAsBinaryString(file);
    });

    // Hàm xóa sạch dữ liệu hệ thống
    function clearData() {
        if (confirm("Hành động này sẽ làm sạch toàn bộ dữ liệu đã tích lũy từ trước đến nay. Bạn có chắc chắn không?")) {
            gsmDatabase = [];
            localStorage.removeItem('gsm_master_db');
            document.getElementById('dateSelect').innerHTML = '<option value="all">-- Tất cả ngày --</option>';
            document.getElementById('searchTeam').value = '';
            renderData();
        }
    }

    // Kích hoạt khi tải trang ban đầu
    window.onload = function() {
        populateDateDropdown();
        renderData();
    };
</script>

</body>
</html>
