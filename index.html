<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hệ Thống Báo Cáo Doanh Thu Toàn Diện - GSM</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/xlsx@0.18.5/dist/xlsx.full.min.js"></script>
    <style>
        body { font-family: 'Segoe UI', system-ui, -apple-system, sans-serif; background-color: #f4f6f9; }
        .custom-scroll::-webkit-scrollbar { width: 6px; height: 6px; }
        .custom-scroll::-webkit-scrollbar-track { background: #f1f1f1; }
        .custom-scroll::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 4px; }
        .tab-active { border-bottom: 2px solid #10b981; color: #059669; font-weight: bold; }
        .tag-active { background-color: #e6f4ea; color: #137333; font-weight: bold; border-color: #137333; }
    </style>
</head>
<body class="p-3 text-[12px] text-gray-700 antialiased">

    <div class="bg-white p-3 rounded shadow-sm flex items-center gap-4 mb-2 flex-wrap border border-gray-100">
        <div class="flex items-center gap-1">
            <span class="text-gray-400 mr-1">Chế độ:</span>
            <button onclick="setMode('day')" id="btnModeDay" class="border px-2.5 py-1 rounded bg-gray-50 hover:bg-gray-100 transition">Theo ngày</button>
            <button onclick="setMode('range')" id="btnModeRange" class="bg-emerald-50 text-emerald-700 border border-emerald-300 px-2.5 py-1 rounded font-bold transition">Khoảng thời gian</button>
        </div>
        <div class="flex items-center gap-1">
            <span class="text-gray-400">Từ</span>
            <input type="date" id="dateFrom" value="2026-05-01" onchange="onDateChange()" class="border p-1 rounded font-medium focus:outline-emerald-500">
            <span class="text-gray-400" id="lblDateTo">Đến</span>
            <input type="date" id="dateTo" value="2026-05-27" onchange="onDateChange()" class="border p-1 rounded font-medium focus:outline-emerald-500">
            <button onclick="renderAll()" class="bg-emerald-500 hover:bg-emerald-600 text-white px-3 py-1 rounded font-bold ml-1 transition">Xem báo cáo</button>
        </div>
        <div class="flex gap-1 text-gray-500">
            <span onclick="setQuickDate(27)" class="border p-1 px-2 rounded cursor-pointer bg-gray-50 hover:bg-gray-100">Kỳ hiện tại</span>
            <span onclick="setQuickDate(30)" class="border p-1 px-2 rounded cursor-pointer hover:bg-gray-100">Tháng trước</span>
            <span onclick="setQuickDate(7)" class="border p-1 px-2 rounded cursor-pointer hover:bg-gray-100">7 ngày gần nhất</span>
        </div>
        <div id="dateSummary" class="text-emerald-600 font-semibold ml-auto bg-emerald-50 px-2 py-1 rounded border border-emerald-200">
            01/05/2026 ➔ 27/05/2026 (27 ngày)
        </div>
    </div>

    <div class="bg-white p-2 rounded shadow-sm flex items-center justify-between mb-2 flex-wrap gap-2 border border-gray-100">
        <div class="flex items-center gap-1.5 w-full md:w-auto flex-wrap">
            <input type="text" id="searchBox" oninput="onSearchChange()" placeholder="🔍 Tìm tài xế / nhân viên - nhập tên hoặc mã..." class="border p-1.5 pl-3 rounded w-64 focus:outline-emerald-500" />
            <button onclick="setTag('all')" id="tag-all" class="border px-2.5 py-1 rounded tag-active transition">Tất cả</button>
            <button onclick="setTag('nv')" id="tag-nv" class="border px-2.5 py-1 rounded bg-gray-50 text-gray-600 hover:bg-gray-100 transition">NV Công ty (<span id="cnt-nv">0</span>)</button>
            <button onclick="setTag('rto')" id="tag-rto" class="border px-2.5 py-1 rounded bg-gray-50 text-gray-600 hover:bg-gray-100 transition">TX RTO (<span id="cnt-rto">0</span>)</button>
            <button onclick="setTag('txz')" id="tag-txz" class="border px-2.5 py-1 rounded bg-gray-50 text-gray-600 hover:bg-gray-100 transition">TX Z (<span id="cnt-txz">0</span>)</button>
        </div>
        
        <div>
            <label class="bg-slate-700 hover:bg-slate-800 text-white px-4 py-2 rounded cursor-pointer font-bold flex items-center gap-1.5 transition shadow-sm">
                📥 Import dữ liệu Excel
                <input type="file" id="excelFile" accept=".xlsx, .xls" class="hidden" />
            </label>
        </div>
    </div>

    <div class="flex border-b border-gray-200 mb-3 text-gray-500 gap-5 font-medium px-2 bg-white pt-2 rounded-t shadow-sm overflow-x-auto whitespace-nowrap">
        <span onclick="switchTab('canhbao')" id="tab-canhbao" class="pb-2 cursor-pointer text-red-500 font-bold border-b-2 border-red-500 transition">⚠️ Cảnh báo chỉ tiêu (<span id="cnt-fail">0</span>)</span>
        <span onclick="switchTab('tonghop')" id="tab-tonghop" class="pb-2 cursor-pointer hover:text-emerald-600 transition">Bảng tổng hợp kỳ</span>
        <span onclick="switchTab('sosanh')" id="tab-sosanh" class="pb-2 cursor-pointer hover:text-emerald-600 transition">So sánh tổ</span>
        <span onclick="switchTab('tongquan')" id="tab-tongquan" class="pb-2 cursor-pointer hover:text-emerald-600 transition">Tổng quan</span>
        <span onclick="switchTab('taixe')" id="tab-taixe" class="pb-2 cursor-pointer hover:text-emerald-600 transition">Tài xế</span>
        <span onclick="switchTab('xuhuong')" id="tab-xuhuong" class="pb-2 cursor-pointer hover:text-emerald-600 transition">Xu hướng</span>
        <span onclick="switchTab('xephang')" id="tab-xephang" class="pb-2 cursor-pointer hover:text-emerald-600 transition">Xếp hạng</span>
    </div>

    <div id="mainContent">
        <div class="bg-white p-12 text-center rounded shadow-sm text-gray-400 border-2 border-dashed border-gray-200">
            <p class="text-sm font-bold mb-1 text-gray-500">Hệ thống chưa có dữ liệu</p>
            <p>Vui lòng bấm nút <span class="font-bold text-slate-700">"Import dữ liệu Excel"</span> ở góc phải để bắt đầu phân tích.</p>
        </div>
    </div>

    <script>
        const teamStyles = [
            { id: 'Tổ 01', color: 'border-green-600 text-green-700 bg-green-50' },
            { id: 'Tổ 02', color: 'border-blue-600 text-blue-700 bg-blue-50' },
            { id: 'Tổ 03', color: 'border-amber-500 text-amber-600 bg-amber-50' },
            { id: 'Tổ 04', color: 'border-purple-600 text-purple-700 bg-purple-50' },
            { id: 'Tổ 05', color: 'border-red-600 text-red-700 bg-red-50' },
            { id: 'Tổ 06', color: 'border-cyan-600 text-cyan-700 bg-cyan-50' }
        ];

        let rawRecords = []; // Lưu trữ lịch sử chạy chi tiết từng ngày của toàn bộ file
        let currentTab = 'canhbao'; 
        let activeTag = 'all';
        let searchKeyword = '';
        let filterLevel50 = 'under50'; 
        let currentMode = 'range';

        // Đọc và chuẩn hóa dữ liệu Excel thông minh hỗ trợ Dòng thời gian
        document.getElementById('excelFile').addEventListener('change', function(e) {
            const file = e.target.files[0];
            if (!file) return;

            const reader = new FileReader();
            reader.onload = function(evt) {
                const data = new Uint8Array(evt.target.result);
                const workbook = XLSX.read(data, { type: 'array' });
                const sheet = workbook.Sheets[workbook.SheetNames[0]];
                const json = XLSX.utils.sheet_to_json(sheet);

                rawRecords = []; // Reset dữ liệu cũ khi nạp file mới

                json.forEach((item) => {
                    let maTX = '', tenTX = '', bks = '', model = '', doanhSo = 0, cuoc = 0, rawDate = null;

                    // Quét cột không phân biệt chữ hoa/thường để tăng độ tương thích file
                    for (let key in item) {
                        let kLower = key.toLowerCase().trim();
                        if (kLower === 'mã tài xế' || kLower === 'mã tx' || kLower === 'ma tx' || kLower === 'driver id') maTX = String(item[key]).trim();
                        if (kLower === 'tên tài xế' || kLower === 'tên tx' || kLower === 'ten tx' || kLower === 'driver name') tenTX = String(item[key]).trim();
                        if (kLower === 'biển kiểm soát' || kLower === 'bks' || kLower === 'bien so') bks = String(item[key]).trim();
                        if (kLower === 'model' || kLower === 'dòng xe' || kLower === 'loại xe') model = String(item[key]).trim();
                        if (kLower === 'doanh số' || kLower === 'doanh thu' || kLower === 'revenue') doanhSo = parseFloat(item[key] || 0);
                        if (kLower === 'số cuốc xe hoàn thành' || kLower === 'số cuốc' || kLower === 'so cuoc' || kLower === 'trips') cuoc = parseInt(item[key] || 0);
                        if (kLower === 'ngày' || kLower === 'ngày chạy' || kLower === 'thời gian' || kLower === 'date') rawDate = item[key];
                    }

                    if (!maTX || !tenTX) return;

                    // Định dạng ngày chuẩn YYYY-MM-DD
                    let recordDate = '';
                    if (rawDate) {
                        if (typeof rawDate === 'number') {
                            let parsed = XLSX.SSF.parse_date_code(rawDate);
                            recordDate = `${parsed.y}-${String(parsed.m).padStart(2,'0')}-${String(parsed.d).padStart(2,'0')}`;
                        } else {
                            let str = String(rawDate).trim();
                            if (str.includes('/')) {
                                let parts = str.split('/');
                                if (parts.length === 3) recordDate = `${parts[2]}-${parts[1].padStart(2,'0')}-${parts[0].padStart(2,'0')}`;
                            } else if (str.includes('-')) {
                                let parts = str.split('-');
                                if (parts.length === 3) {
                                    if (parts[0].length === 4) recordDate = str;
                                    else recordDate = `${parts[2]}-${parts[1].padStart(2,'0')}-${parts[0].padStart(2,'0')}`;
                                }
                            }
                        }
                    }

                    // Nếu dòng không có ngày, tự gán theo ngày bộ lọc hiện tại để tránh mất dữ liệu
                    if (!recordDate) recordDate = document.getElementById('dateFrom').value;

                    let type = 'nv'; 
                    if (maTX.length % 3 === 0) type = 'rto';
                    else if (maTX.length % 3 === 1) type = 'txz';

                    let hash = 0;
                    for (let i = 0; i < maTX.length; i++) hash += maTX.charCodeAt(i);
                    const teamIndex = hash % 6; 

                    rawRecords.push({ id: maTX, name: tenTX, bks, model, dt: doanhSo, cuoc, type, teamIndex, date: recordDate });
                });

                document.getElementById('excelFile').value = ''; 
                updateTagCounters();
                renderAll();
            };
            reader.readAsArrayBuffer(file);
        });

        // HÀM TỔNG HỢP ĐỘNG DỮ LIỆU DỰA TRÊN NGÀY ĐƯỢC CHỌN
        function getAggregatedData(fromDate, toDate) {
            let filtered = rawRecords.filter(r => r.date >= fromDate && r.date <= toDate);
            let driversMap = {};

            filtered.forEach(r => {
                if (!driversMap[r.id]) {
                    driversMap[r.id] = {
                        id: r.id, name: r.name, bks: r.bks, model: r.model,
                        dt: 0, cuoc: 0, type: r.type, teamIndex: r.teamIndex,
                        datesActive: new Set()
                    };
                }
                let d = driversMap[r.id];
                d.dt += r.dt;
                d.cuoc += r.cuoc;
                if (r.dt > 0 || r.cuoc > 0) d.datesActive.add(r.date);
            });

            return Object.values(driversMap).map((d, index) => {
                d.stt = index + 1;
                d.workingDays = d.datesActive.size > 0 ? d.datesActive.size : 1; 
                return d;
            });
        }

        function updateTagCounters() {
            const fromDate = document.getElementById('dateFrom').value;
            const toDate = document.getElementById('dateTo').value;
            const activeData = getAggregatedData(fromDate, toDate);

            document.getElementById('cnt-nv').innerText = activeData.filter(i => i.type === 'nv').length;
            document.getElementById('cnt-rto').innerText = activeData.filter(i => i.type === 'rto').length;
            document.getElementById('cnt-txz').innerText = activeData.filter(i => i.type === 'txz').length;
            
            let failCount = 0;
            activeData.forEach(d => {
                let target = getDriverTarget(d, fromDate, toDate);
                if (d.dt < target) failCount++;
            });
            document.getElementById('cnt-fail').innerText = failCount;
        }

        // TÍNH TOÁN ĐỊNH MỨC THÔNG MINH THEO NGÀY CÔNG THỰC TẾ TRONG KỲ LỌC
        function getDriverTarget(driver, dateFromStr, dateToStr) {
            let reportDays = getReportDays();
            let days = driver.workingDays;

            let model = (driver.model || '').toUpperCase();
            let isVf8Vip = model.includes('VIP') || model.includes('GF');
            let isPremium = model.includes('VF8') || model.includes('VF7') || model.includes('PREMIUM');

            let weekdayRate = 1000000; 
            let weekendRate = 1800000; 

            if (isVf8Vip) {
                weekdayRate = 600000;   
                weekendRate = 700000;   
            } else if (isPremium) {
                weekdayRate = 1000000;  
                weekendRate = 1600000;  
            }

            // Nếu tài xế chạy đủ toàn bộ số ngày lọc, tính chuẩn xác theo thứ tự Lịch Thứ/Chủ Nhật
            if (days === reportDays) {
                return calculateTargetRevenue(weekdayRate, weekendRate, dateFromStr, dateToStr);
            }
            
            // Nếu tài xế chỉ chạy một vài ngày lướt sóng, phân bổ tỷ lệ bình quân tuần
            let avgDailyTarget = (weekdayRate * 4 + weekendRate * 3) / 7;
            return Math.round(avgDailyTarget * days);
        }

        function calculateTargetRevenue(weekdayRate, weekendRate, dateFromStr, dateToStr) {
            let start = new Date(dateFromStr);
            let end = new Date(dateToStr);
            let totalTarget = 0;
            let curr = new Date(start);
            while (curr <= end) {
                let day = curr.getDay(); 
                if (day >= 1 && day <= 4) totalTarget += weekdayRate;
                else totalTarget += weekendRate;
                curr.setDate(curr.getDate() + 1);
            }
            return totalTarget;
        }

        function getReportDays() {
            const d1 = new Date(document.getElementById('dateFrom').value);
            const d2 = new Date(document.getElementById('dateTo').value);
            return Math.ceil(Math.abs(d2 - d1) / (1000 * 60 * 60 * 24)) + 1 || 1;
        }

        function onDateChange() {
            if (currentMode === 'day') {
                document.getElementById('dateTo').value = document.getElementById('dateFrom').value;
            }
            const days = getReportDays();
            if (currentMode === 'day') {
                document.getElementById('dateSummary').innerText = `Ngày báo cáo: ${formatDateStr(document.getElementById('dateFrom').value)}`;
            } else {
                document.getElementById('dateSummary').innerText = `${formatDateStr(document.getElementById('dateFrom').value)} ➔ ${formatDateStr(document.getElementById('dateTo').value)} (${days} ngày)`;
            }
            updateTagCounters();
            renderAll();
        }

        function formatDateStr(dateStr) {
            const d = new Date(dateStr);
            return `${String(d.getDate()).padStart(2, '0')}/${String(d.getMonth()+1).padStart(2, '0')}/${d.getFullYear()}`;
        }

        function setQuickDate(days) {
            currentMode = 'range';
            document.getElementById('dateTo').classList.remove('hidden');
            document.getElementById('lblDateTo').classList.remove('hidden');
            document.getElementById('btnModeDay').className = "border px-2.5 py-1 rounded bg-gray-50 hover:bg-gray-100";
            document.getElementById('btnModeRange').className = "bg-emerald-50 text-emerald-700 border border-emerald-300 px-2.5 py-1 rounded font-bold";

            const to = new Date("2026-05-27");
            const from = new Date(to);
            from.setDate(to.getDate() - days + 1);
            document.getElementById('dateTo').value = to.toISOString().split('T')[0];
            document.getElementById('dateFrom').value = from.toISOString().split('T')[0];
            onDateChange();
        }

        function setMode(mode) {
            currentMode = mode;
            if (mode === 'day') {
                document.getElementById('dateTo').classList.add('hidden');
                document.getElementById('lblDateTo').classList.add('hidden');
                document.getElementById('dateTo').value = document.getElementById('dateFrom').value;
            } else {
                document.getElementById('dateTo').classList.remove('hidden');
                document.getElementById('lblDateTo').classList.remove('hidden');
            }
            document.getElementById('btnModeDay').className = mode === 'day' ? "bg-emerald-50 text-emerald-700 border border-emerald-300 px-2.5 py-1 rounded font-bold" : "border px-2.5 py-1 rounded bg-gray-50 hover:bg-gray-100";
            document.getElementById('btnModeRange').className = mode === 'range' ? "bg-emerald-50 text-emerald-700 border border-emerald-300 px-2.5 py-1 rounded font-bold" : "border px-2.5 py-1 rounded bg-gray-50 hover:bg-gray-100";
            onDateChange();
        }

        function onSearchChange() {
            searchKeyword = document.getElementById('searchBox').value.toLowerCase().trim();
            renderAll();
        }

        function setTag(tag) {
            ['all', 'nv', 'rto', 'txz'].forEach(t => document.getElementById(`tag-${t}`).className = "border px-2.5 py-1 rounded bg-gray-50 text-gray-600 hover:bg-gray-100 transition");
            document.getElementById(`tag-${tag}`).className = "border px-2.5 py-1 rounded tag-active transition";
            activeTag = tag;
            renderAll();
        }

        function switchTab(tab) {
            ['tonghop', 'sosanh', 'tongquan', 'taixe', 'xuhuong', 'xephang', 'canhbao'].forEach(t => {
                const el = document.getElementById(`tab-${t}`);
                if(el) el.className = "pb-2 cursor-pointer hover:text-emerald-600 transition";
            });
            if(tab === 'canhbao') {
                document.getElementById(`tab-${tab}`).className = "pb-2 cursor-pointer border-b-2 border-red-500 text-red-600 font-bold transition";
            } else {
                document.getElementById(`tab-${tab}`).className = "pb-2 cursor-pointer tab-active hover:text-emerald-600 transition";
            }
            currentTab = tab;
            renderAll();
        }

        function changeCanhBaoFilter(level) {
            filterLevel50 = level;
            renderAll();
        }

        function renderAll() {
            if (rawRecords.length === 0) return;
            const container = document.getElementById('mainContent');
            const fromDate = document.getElementById('dateFrom').value;
            const toDate = document.getElementById('dateTo').value;

            // LẤY DỮ LIỆU ĐÃ ĐƯỢC CỘNG DỒN RIÊNG THEO THỜI GIAN ĐÃ CHỌN
            const periodData = getAggregatedData(fromDate, toDate);

            // Áp dụng bộ lọc tìm kiếm & tag phân loại
            const data = periodData.filter(item => {
                const matchTag = (activeTag === 'all' || item.type === activeTag);
                const matchSearch = (!searchKeyword || item.name.toLowerCase().includes(searchKeyword) || item.id.toLowerCase().includes(searchKeyword));
                return matchTag && matchSearch;
            });

            const totalDays = getReportDays();

            // RENDER TAB 1: CẢNH BÁO CHỈ TIÊU ĐỘNG
            if (currentTab === 'canhbao') {
                let nonCompliantDrivers = data.map(d => {
                    let required = getDriverTarget(d, fromDate, toDate);
                    let rate = required > 0 ? (d.dt / required) * 100 : 100;
                    return { ...d, targetRevenue: required, deficit: required - d.dt, percentAchieved: rate };
                }).filter(d => d.deficit > 0);

                const countUnder50 = nonCompliantDrivers.filter(d => d.percentAchieved < 50).length;

                if (filterLevel50 === 'under50') {
                    nonCompliantDrivers = nonCompliantDrivers.filter(d => d.percentAchieved < 50);
                }

                if (nonCompliantDrivers.length === 0) {
                    container.innerHTML = `
                        <div class="bg-white p-3 rounded shadow-sm border border-gray-100 mb-2 flex items-center gap-3">
                            <span class="font-bold text-gray-500">Mức độ lọc:</span>
                            <button onclick="changeCanhBaoFilter('all')" class="px-3 py-1.5 rounded font-bold text-[11px] ${filterLevel50 === 'all' ? 'bg-red-600 text-white' : 'bg-gray-100 text-gray-600'}">Tất cả hụt chỉ tiêu</button>
                            <button onclick="changeCanhBaoFilter('under50')" class="px-3 py-1.5 rounded font-bold text-[11px] ${filterLevel50 === 'under50' ? 'bg-red-700 text-white' : 'bg-orange-50 text-orange-700 border border-orange-200'}">⚠️ Đạt dưới 50% chỉ tiêu (${countUnder50})</button>
                        </div>
                        <div class="bg-white p-12 text-center rounded shadow-sm text-gray-500 border border-gray-100">
                            <p class="text-emerald-600 font-bold text-sm mb-1">🎉 Chúc mừng! Không có lái xe nào thuộc điều kiện lọc này.</p>
                        </div>`;
                    return;
                }

                container.innerHTML = `
                    <div class="bg-white p-3 rounded shadow-sm border border-gray-100 mb-2 flex items-center justify-between flex-wrap gap-2">
                        <div class="flex items-center gap-3">
                            <span class="font-bold text-gray-500">Bộ lọc nhanh:</span>
                            <button onclick="changeCanhBaoFilter('all')" class="px-3 py-1.5 rounded font-bold text-[11px] ${filterLevel50 === 'all' ? 'bg-red-600 text-white shadow-sm' : 'bg-gray-100 text-gray-600 hover:bg-gray-200'}">Tất cả hụt chỉ tiêu</button>
                            <button onclick="changeCanhBaoFilter('under50')" class="px-3 py-1.5 rounded font-bold text-[11px] flex items-center gap-1 ${filterLevel50 === 'under50' ? 'bg-red-700 text-white shadow-sm' : 'bg-orange-50 text-orange-700 border border-orange-200 hover:bg-orange-100'}">
                                ⚠️ Chỉ xem lái xe đạt DƯỚI 50% định mức (<span class="font-black">${countUnder50}</span> tài xế)
                            </button>
                        </div>
                        <div class="text-[11px] text-emerald-600 font-bold">
                            💡 Đang tính toán dựa theo đúng khung thời gian từ ${formatDateStr(fromDate)} đến ${formatDateStr(toDate)}
                        </div>
                    </div>

                    <div class="bg-white rounded shadow-sm overflow-hidden border border-red-100">
                        <div class="p-3 ${filterLevel50 === 'under50' ? 'bg-orange-50 text-orange-800' : 'bg-red-50 text-red-700'} font-bold border-b border-red-100 flex justify-between items-center">
                            <span class="uppercase">${filterLevel50 === 'under50' ? '⚠️ DANH SÁCH TÀI XẾ KHÔNG ĐẠT MỐC 50% CHỈ TIÊU KỲ CHỌN' : '📋 DANH SÁCH LÁI XE HỤT CHỈ TIÊU DOANH SỐ'}</span>
                            <span class="bg-white/80 px-2 py-0.5 rounded text-[11px] shadow-sm">Tìm thấy ${nonCompliantDrivers.length} người</span>
                        </div>
                        <div class="overflow-x-auto max-h-[500px] custom-scroll">
                            <table class="w-full text-left border-collapse">
                                <thead>
                                    <tr class="bg-gray-50 border-b border-gray-200 text-gray-500 font-semibold sticky top-0 bg-white">
                                        <th class="p-2 pl-4">STT</th><th class="p-2">Mã TX</th><th class="p-2">Tên Tài Xế</th><th class="p-2">Tổ</th><th class="p-2">Dòng xe</th>
                                        <th class="p-2 text-center bg-blue-50/50 text-blue-700">Ngày Chạy Trong Kỳ</th>
                                        <th class="p-2 text-right">Doanh số đạt</th><th class="p-2 text-right">Định mức kỳ này</th>
                                        <th class="p-2 text-center">% Hoàn thành</th><th class="p-2 text-right pr-4 text-red-600 bg-red-50/20">Còn Thiếu</th>
                                    </tr>
                                </thead>
                                <tbody class="divide-y divide-gray-100">
                                    ${nonCompliantDrivers.map((d, i) => {
                                        const isCritical = d.percentAchieved < 50;
                                        return `
                                        <tr class="${isCritical ? 'bg-orange-50/30 hover:bg-orange-50/60' : 'hover:bg-red-50/30'} transition">
                                            <td class="p-2 pl-4 text-gray-400">${i+1}</td>
                                            <td class="p-2 font-mono font-bold text-gray-800">${d.id}</td>
                                            <td class="p-2 font-medium">${d.name}</td>
                                            <td class="p-2"><span class="px-1.5 py-0.5 rounded bg-gray-100 font-semibold">Tổ 0${d.teamIndex+1}</span></td>
                                            <td class="p-2"><span class="bg-slate-100 px-1.5 py-0.5 rounded font-medium">${d.model}</span></td>
                                            <td class="p-2 text-center font-bold text-blue-600 bg-blue-50/10">${d.workingDays} ngày</td>
                                            <td class="p-2 text-right font-bold text-gray-600">${d.dt.toLocaleString()} đ</td>
                                            <td class="p-2 text-right font-semibold text-gray-700">${d.targetRevenue.toLocaleString()} đ</td>
                                            <td class="p-2 text-center">
                                                <span class="px-2 py-0.5 rounded-full font-black ${isCritical ? 'bg-red-100 text-red-700 border border-red-200' : 'bg-amber-100 text-amber-800'}">
                                                    ${d.percentAchieved.toFixed(1)}%
                                                </span>
                                            </td>
                                            <td class="p-2 text-right pr-4 font-black text-red-600 bg-red-50/30">-${d.deficit.toLocaleString()} đ</td>
                                        </tr>`;
                                    }).join('')}
                                </tbody>
                            </table>
                        </div>
                    </div>`;

            // RENDER TAB 2: BẢNG TỔNG HỢP THEO KỲ CHỌN
            } else if (currentTab === 'tonghop') {
                container.innerHTML = `
                    <div class="bg-white rounded shadow-sm overflow-hidden border border-gray-100">
                        <div class="overflow-x-auto max-h-[500px] custom-scroll">
                            <table class="w-full text-left border-collapse">
                                <thead>
                                    <tr class="bg-gray-50 border-b border-gray-200 text-gray-500 font-semibold sticky top-0 bg-white">
                                        <th class="p-2 pl-4">STT</th><th class="p-2">Mã TX</th><th class="p-2">Tên Tài Xế</th><th class="p-2">BKS</th><th class="p-2">Model</th><th class="p-2 text-center">Số Ngày Chạy</th><th class="p-2 text-right">Số Cuốc</th><th class="p-2 text-right pr-4">Tổng Doanh Số</th>
                                    </tr>
                                </thead>
                                <tbody class="divide-y divide-gray-100">
                                    ${data.map((d, i) => `
                                        <tr class="hover:bg-gray-50">
                                            <td class="p-2 pl-4 text-gray-400">${i+1}</td><td class="p-2 font-mono font-bold">${d.id}</td><td class="p-2 font-medium">${d.name}</td><td class="p-2">${d.bks}</td><td class="p-2"><span class="bg-gray-100 px-1.5 py-0.5 rounded">${d.model}</span></td><td class="p-2 text-center font-bold text-blue-600">${d.workingDays} ngày</td><td class="p-2 text-right font-semibold">${d.cuoc}</td><td class="p-2 text-right pr-4 font-bold text-emerald-600">${d.dt.toLocaleString()} đ</td>
                                        </tr>
                                    `).join('')}
                                </tbody>
                            </table>
                        </div>
                    </div>`;

            // RENDER TAB 3: SO SÁNH TỔ THEO THỜI GIAN
            } else if (currentTab === 'sosanh') {
                let teams = teamStyles.map(style => ({ ...style, totalTx: 0, activeTx: 0, totalDt: 0, drivers: [] }));
                data.forEach(item => {
                    let t = teams[item.teamIndex];
                    t.totalTx++;
                    if (item.dt > 0) { t.activeTx++; t.totalDt += item.dt; }
                    t.drivers.push(item);
                });

                let html = `<div class="grid grid-cols-1 sm:grid-cols-2 md:grid-cols-3 lg:grid-cols-6 gap-3">`;
                teams.forEach(team => {
                    team.drivers.sort((a, b) => b.dt - a.dt);
                    const topDrivers = team.drivers.slice(0, 5);
                    const avgDay = team.activeTx > 0 ? (team.totalDt / team.activeTx / totalDays) : 0;
                    const avgPeriod = team.activeTx > 0 ? (team.totalDt / team.activeTx) : 0;

                    html += `
                        <div class="bg-white border-t-4 ${team.color.split(' ')[0]} rounded shadow-sm flex flex-col border border-gray-100">
                            <div class="p-2 flex justify-between items-center border-b font-bold ${team.color.split(' ')[2]}">
                                <span class="${team.color.split(' ')[1]}">${team.id}</span>
                                <span class="text-gray-400 text-[10px]">${team.activeTx}/${team.totalTx} TX</span>
                            </div>
                            <div class="p-2 border-b space-y-1 text-[11px]">
                                <div class="flex justify-between"><span class="text-gray-400">Tổng doanh thu</span><span class="font-bold text-gray-800">${formatMoney(team.totalDt, 'M')}</span></div>
                                <div class="flex justify-between"><span class="text-gray-400">TB / TX / ngày</span><span class="font-bold text-gray-700">${formatMoney(avgDay, 'K')}</span></div>
                                <div class="flex justify-between"><span class="text-gray-400">TB / TX cả kỳ</span><span class="font-bold text-gray-700">${formatMoney(avgPeriod, 'M')}</span></div>
                            </div>
                            <div class="p-2 flex-1 space-y-1.5 bg-gray-50/30">
                                ${topDrivers.map(d => `
                                    <div class="flex justify-between items-center text-[11px]">
                                        <div class="truncate text-gray-700 font-medium">${d.name}</div>
                                        <span class="font-bold text-emerald-600">${formatMoney(d.dt, 'M')}</span>
                                    </div>
                                `).join('')}
                            </div>
                        </div>`;
                });
                html += `</div>`;
                container.innerHTML = html;

            // RENDER TAB 4: TỔNG QUAN CHỈ SỐ DOANH THU
            } else if (currentTab === 'tongquan') {
                const totalRev = data.reduce((sum, i) => sum + i.dt, 0);
                const totalTrips = data.reduce((sum, i) => sum + i.cuoc, 0);
                const activeDrivers = data.filter(i => i.dt > 0).length;
                container.innerHTML = `
                    <div class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-4 gap-4">
                        <div class="bg-white p-4 rounded shadow-sm border border-gray-100"><p class="text-gray-400 uppercase text-[10px]">Tổng doanh thu</p><p class="text-2xl font-black text-emerald-600 my-1">${totalRev.toLocaleString()} đ</p></div>
                        <div class="bg-white p-4 rounded shadow-sm border border-gray-100"><p class="text-gray-400 uppercase text-[10px]">Tổng số cuốc</p><p class="text-2xl font-black text-blue-600 my-1">${totalTrips.toLocaleString()} cuốc</p></div>
                        <div class="bg-white p-4 rounded shadow-sm border border-gray-100"><p class="text-gray-400 uppercase text-[10px]">Tài xế hoạt động kì này</p><p class="text-2xl font-black text-purple-600 my-1">${activeDrivers} / ${data.length} TX</p></div>
                        <div class="bg-white p-4 rounded shadow-sm border border-gray-100"><p class="text-gray-400 uppercase text-[10px]">Doanh thu bình quân đầu xe</p><p class="text-2xl font-black text-orange-500 my-1">${activeDrivers ? Math.round(totalRev/activeDrivers).toLocaleString() : 0} đ</p></div>
                    </div>`;

            // RENDER TAB 5: DANH SÁCH TÀI XẾ CHI TIẾT
            } else if (currentTab === 'taixe') {
                container.innerHTML = `
                    <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-3">
                        ${data.slice(0, 30).map(d => {
                            const hieuSuat = d.cuoc > 0 ? Math.round(d.dt / d.cuoc) : 0;
                            return `
                            <div class="bg-white p-3 rounded shadow-sm border border-gray-100 flex flex-col justify-between">
                                <div class="flex justify-between items-start mb-2">
                                    <div><p class="font-bold text-gray-800 text-[13px]">${d.name}</p><p class="text-gray-400 font-mono text-[10px]">${d.id} | Tổ 0${d.teamIndex + 1}</p></div>
                                    <span class="bg-emerald-50 text-emerald-700 px-2 py-0.5 rounded font-bold">${d.model}</span>
                                </div>
                                <div class="grid grid-cols-3 gap-1 border-t pt-2 text-center text-[11px]">
                                    <div><p class="text-gray-400">Doanh thu kì này</p><p class="font-bold text-slate-700">${formatMoney(d.dt, 'M')}</p></div>
                                    <div><p class="text-gray-400">Số cuốc</p><p class="font-bold text-slate-700">${d.cuoc}</p></div>
                                    <div><p class="text-gray-400">Giá trị/cuốc</p><p class="font-bold text-emerald-600">${formatMoney(hieuSuat, 'K')}</p></div>
                                </div>
                            </div>`;
                        }).join('')}
                    </div>`;

            // RENDER TAB 6: XU HƯỚNG DÒNG XE
            } else if (currentTab === 'xuhuong') {
                let modelGroup = {};
                data.forEach(item => {
                    if(!modelGroup[item.model]) modelGroup[item.model] = { name: item.model, totalDt: 0, totalCuoc: 0, count: 0 };
                    modelGroup[item.model].totalDt += item.dt;
                    modelGroup[item.model].totalCuoc += item.cuoc;
                    modelGroup[item.model].count++;
                });

                container.innerHTML = `
                    <div class="bg-white p-4 rounded shadow-sm border border-gray-100">
                        <h3 class="text-sm font-bold text-gray-700 mb-4">Hiệu quả doanh thu theo Dòng Xe (Trong khung ngày chọn)</h3>
                        <div class="space-y-4">
                            ${Object.values(modelGroup).map(m => {
                                const avgModel = Math.round(m.totalDt / m.count);
                                return `
                                <div>
                                    <div class="flex justify-between mb-1 font-medium">
                                        <span>🚗 Dòng xe: <strong class="text-slate-800">${m.name || 'Khác'}</strong> (${m.count} xe chạy)</span>
                                        <span class="text-emerald-600 font-bold">${m.totalDt.toLocaleString()} đ</span>
                                    </div>
                                    <div class="w-full bg-gray-100 rounded-full h-3 overflow-hidden">
                                        <div class="bg-gradient-to-r from-emerald-400 to-teal-600 h-3 rounded-full" style="width: ${Math.min(100, (m.totalDt / 100000000) * 100)}%"></div>
                                    </div>
                                    <div class="flex gap-4 text-gray-400 text-[11px] mt-1">
                                        <span>Tổng số cuốc: <strong>${m.totalCuoc}</strong></span>
                                        <span>Bình quân/đầu xe kì này: <strong class="text-gray-600">${avgModel.toLocaleString()} đ</strong></span>
                                    </div>
                                </div>`;
                            }).join('')}
                        </div>
                    </div>`;

            // RENDER TAB 7: XẾP HẠNG
            } else if (currentTab === 'xephang') {
                const topRevenue = [...data].sort((a,b) => b.dt - a.dt).slice(0, 10);
                const topCuoc = [...data].sort((a,b) => b.cuoc - a.cuoc).slice(0, 10);

                container.innerHTML = `
                    <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                        <div class="bg-white p-3 rounded shadow-sm border border-gray-100">
                            <h3 class="text-emerald-700 font-bold border-b pb-2 mb-2 text-sm">🏆 TOP 10 VUA DOANH SỐ KỲ NÀY</h3>
                            <div class="divide-y">
                                ${topRevenue.map((d, idx) => `
                                    <div class="flex justify-between items-center py-2">
                                        <div class="flex items-center gap-2">
                                            <span class="w-5 h-5 bg-amber-100 text-amber-800 rounded-full flex items-center justify-center font-bold text-[10px]">${idx+1}</span>
                                            <div><p class="font-semibold text-gray-800">${d.name}</p><p class="text-gray-400 text-[10px]">${d.id} - Tổ 0${d.teamIndex+1}</p></div>
                                        </div>
                                        <span class="font-black text-emerald-600">${d.dt.toLocaleString()} đ</span>
                                    </div>`).join('')}
                            </div>
                        </div>
                        <div class="bg-white p-3 rounded shadow-sm border border-gray-100">
                            <h3 class="text-blue-700 font-bold border-b pb-2 mb-2 text-sm">⚡ TOP 10 CHĂM CHỈ KỲ NÀY (SỐ CUỐC ĐẠT)</h3>
                            <div class="divide-y">
                                ${topCuoc.map((d, idx) => `
                                    <div class="flex justify-between items-center py-2">
                                        <div class="flex items-center gap-2">
                                            <span class="w-5 h-5 bg-blue-100 text-blue-800 rounded-full flex items-center justify-center font-bold text-[10px]">${idx+1}</span>
                                            <div><p class="font-semibold text-gray-800">${d.name}</p><p class="text-gray-400 text-[10px]">${d.id} - Tổ 0${d.teamIndex+1}</p></div>
                                        </div>
                                        <span class="font-black text-blue-600">${d.cuoc} cuốc</span>
                                    </div>`).join('')}
                            </div>
                        </div>
                    </div>`;
            }
        }

        function formatMoney(num, unit) {
            if (num === 0) return '0' + (unit === 'M' ? 'M' : 'K');
            if (unit === 'M') return (num / 1000000).toFixed(2) + 'M';
            if (unit === 'K') return Math.round(num / 1000).toLocaleString() + 'K';
            return num;
        }
    </script>
</body>
</html>
