<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Báo Cáo Doanh Thu Tổ</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background-color: #f3f4f6; }
        .card-team { transition: transform 0.2s; }
        .card-team:hover { transform: translateY(-5px); }
    </style>
</head>
<body class="p-4">

    <!-- Thanh công cụ phía trên -->
    <div class="bg-white p-4 rounded-lg shadow-sm mb-4 flex flex-wrap items-center gap-4 border-b-2 border-emerald-500">
        <h1 class="text-xl font-bold text-emerald-700">Dashboard Quản Lý</h1>
        <div class="flex gap-2">
            <input type="date" value="2026-05-01" class="border p-1 rounded text-sm">
            <span class="self-center">đến</span>
            <input type="date" value="2026-05-27" class="border p-1 rounded text-sm">
            <button class="bg-emerald-500 text-white px-4 py-1 rounded font-bold hover:bg-emerald-600">Xem báo cáo</button>
        </div>
        <div class="ml-auto text-gray-500 text-sm italic">Cập nhật: 01/06/2026</div>
    </div>

    <!-- Khu vực hiển thị 6 Tổ (Giống ảnh image_0d02c4.jpg) -->
    <div id="dashboard" class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 xl:grid-cols-6 gap-4">
        <!-- Tổ sẽ được tự động tạo ở đây bằng JavaScript bên dưới -->
    </div>

    <script>
        // Dữ liệu mẫu mô phỏng từ ảnh image_0d02c4.jpg
        const teams = [
            { id: "Tổ 01", color: "border-green-600", bg: "bg-green-50", text: "text-green-700", totalDt: "2435.23M", avg: "779K", drivers: ["Phùng Quang Huy", "Trần Mạnh Hoàng", "Lê Xuân Hạnh"] },
            { id: "Tổ 02", color: "border-blue-600", bg: "bg-blue-50", text: "text-blue-700", totalDt: "2648.36M", avg: "830K", drivers: ["Nguyễn Mạnh Tài", "Đào Duy Khánh", "Hoàng Văn Vượng"] },
            { id: "Tổ 03", color: "border-orange-500", bg: "bg-orange-50", text: "text-orange-600", totalDt: "2541.54M", avg: "829K", drivers: ["Ninh Quốc Thành", "Dương Đức Minh", "Trần Việt Dũng"] },
            { id: "Tổ 04", color: "border-purple-600", bg: "bg-purple-50", text: "text-purple-700", totalDt: "2656.89M", avg: "809K", drivers: ["Trương Ngọc Hiếu", "Vũ Ngọc Đông", "Phạm Duy Hiển"] },
            { id: "Tổ 05", color: "border-red-600", bg: "bg-red-50", text: "text-red-700", totalDt: "2622.85M", avg: "818K", drivers: ["Nguyễn Hoàng Hải", "Vy Thanh Tú", "Đỗ Văn Thế"] },
            { id: "Tổ 06", color: "border-cyan-600", bg: "bg-cyan-50", text: "text-cyan-700", totalDt: "2037.33M", avg: "719K", drivers: ["Trần Anh Tuấn", "Bùi Đức Thủy", "Vương Đình Thông"] }
        ];

        const container = document.getElementById('dashboard');

        teams.forEach(team => {
            const card = `
                <div class="card-team bg-white rounded-lg shadow border-t-4 ${team.color} flex flex-col overflow-hidden">
                    <div class="p-3 border-b flex justify-between items-center ${team.bg}">
                        <span class="font-bold ${team.text}">${team.id}</span>
                        <span class="text-[10px] text-gray-400 font-semibold">130/129 TX có DT</span>
                    </div>
                    <div class="p-3 text-xs space-y-2 border-b">
                        <div class="flex justify-between">
                            <span class="text-gray-500">Tổng DT kỳ:</span>
                            <span class="font-bold">${team.totalDt}</span>
                        </div>
                        <div class="flex justify-between">
                            <span class="text-gray-500">TB DT/ngày:</span>
                            <span class="font-bold">${team.avg}</span>
                        </div>
                    </div>
                    <div class="p-3 flex-grow bg-gray-50/50">
                        <p class="text-[10px] font-bold text-gray-400 mb-2 uppercase">Top tài xế</p>
                        ${team.drivers.map(d => `<div class="flex justify-between text-[11px] mb-1"><span>${d}</span> <span class="text-emerald-600 font-bold">50.2M</span></div>`).join('')}
                    </div>
                </div>
            `;
            container.innerHTML += card;
        });
    </script>
</body>
</html>
