<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Báo Cáo Doanh Thu Theo Tổ & Ngày - Bản Sửa Lỗi Triệt Để</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background-color: #f8fafc; }
        .tab-active { border-bottom: 3px solid #10b981; color: #10b981; font-weight: bold; }
    </style>
</head>
<body class="p-4 text-gray-700 text-sm">

    <div class="bg-white p-3 rounded-lg shadow-sm border border-gray-100 flex flex-wrap gap-3 items-center justify-between mb-4">
        <div class="flex flex-wrap gap-2 items-center">
            <span class="font-medium text-gray-500">Chế độ:</span>
            <button onclick="setPresetDate('today')" class="px-3 py-1 border rounded flex items-center gap-1 hover:bg-gray-50"><i class="fa-regular fa-calendar"></i> Hôm nay (26/05)</button>
            <button class="px-3 py-1 bg-emerald-50 text-emerald-600 border border-emerald-200 rounded flex items-center gap-1 font-medium"><i class="fa-regular fa-calendar-days"></i> Khoảng thời gian</button>
            
            <span class="text-gray-400 mx-1">Từ</span>
            <input type="date" id="startDate" value="2026-05-26" onchange="onDateFilterChange()" class="border p-1 rounded focus:outline-emerald-500">
            <span class="text-gray-400">→ Đến</span>
            <input type="date" id="endDate" value="2026-05-26" onchange="onDateFilterChange()" class="border p-1 rounded focus:outline-emerald-500">
            
            <button onclick="onDateFilterChange()" class="bg-emerald-500 hover:bg-emerald-600 text-white px-4 py-1.5 rounded font-medium transition">Xem báo cáo</button>
            <button onclick="setPresetDate('ky')" class="px-3 py-1 border rounded text-gray-600 hover:bg-gray-50">Cả kỳ (Tháng 5)</button>
        </div>
        <div class="text-emerald-600 font-medium" id="dateDisplayRange">
            26/05/2026 → 26/05/2026 <span class="text-gray-400 font-normal">(1 ngày)</span>
        </div>
    </div>

    <div class="bg-white p-3 rounded-lg shadow-sm border border-gray-100 flex flex-wrap gap-3 items-center justify-between mb-4">
        <div class="flex items-center gap-2 flex-1 max-w-md relative">
            <i class="fa-solid fa-magnifying-glass absolute left-3 text-gray-400"></i>
            <input type="text" id="searchDriver" placeholder="Tìm tài xế theo tên hoặc mã tài xế..." oninput="renderDashboard()" class="w-full pl-9 pr-4 py-1.5 border rounded-full bg-gray-50 focus:bg-white focus:outline-emerald-500">
        </div>
        <div class="flex gap-2">
            <button class="px-3 py-1 bg-emerald-100 text-emerald-700 rounded-full font-medium">Tất cả</button>
            <button class="px-3 py-1 bg-blue-50 text-blue-700 rounded-full border border-blue-100"><i class="fa-solid fa-user-tie"></i> NV Công ty</button>
        </div>
    </div>

    <div class="bg-white rounded-lg shadow-sm border border-gray-100 mb-4 flex justify-between items-center px-4">
        <div class="flex gap-6 py-3">
            <button onclick="switchTab(this, 'so-sanh')" class="flex items-center gap-1.5 text-gray-500 pb-1 tab-active"><i class="fa-solid fa-users-viewfinder"></i> So sánh tổ</button>
            <button onclick="switchTab(this, 'tong-quan')" class="flex items-center gap-1.5 text-gray-500 pb-1 hover:text-emerald-500"><i class="fa-solid fa-eye"></i> Tổng quan</button>
        </div>
        
        <div class="flex gap-2 items-center py-2">
            <button onclick="resetData()" class="px-2 py-1 bg-red-50 text-red-600 border border-red-200 rounded hover:bg-red-100 flex items-center gap-1">
                <i class="fa-solid fa-trash-can"></i> Xóa dữ liệu cũ
            </button>
            <label class="bg-emerald-600 hover:bg-emerald-700 text-white px-4 py-1.5 rounded flex items-center gap-2 cursor-pointer transition font-medium shadow-sm">
                <i class="fa-solid fa-file-excel text-base"></i> Tải File Excel Lên
                <input type="file" id="excelFile" accept=".xlsx, .xls" class="hidden" onchange="importExcel(event)">
            </label>
        </div>
    </div>

    <div id="main-content">
        <div id="tab-so-sanh" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 xl:grid-cols-6 gap-4">
            </div>
        <div id="tab-other" class="hidden bg-white p-8 rounded-lg shadow-sm border border-gray-100 text-center text-gray-500">
            <i class="fa-solid fa-folder-open text-4xl text-emerald-400 mb-2"></i>
            <h3 class="text-lg font-bold text-gray-700 mb-1">Tính năng đang chạy ngầm</h3>
        </div>
    </div>

    <script>
        const toMeta = {
            "Tổ 01": { color: "border-emerald-700", textColor: "text-emerald-700", bgLight: "bg-emerald-700" },
            "Tổ 02": { color: "border-blue-600", textColor: "text-blue-600", bgLight: "bg-blue-600" },
            "Tổ 03": { color: "border-amber-500", textColor: "text-amber-500", bgLight: "bg-amber-500" },
            "Tổ 04": { color: "border-purple-600", textColor: "text-purple-600", bgLight: "bg-purple-600" },
            "Tổ 05": { color: "border-red-600", textColor: "text-red-600", bgLight: "bg-red-600" },
            "Tổ 06": { color: "border-sky-500", textColor: "text-sky-500", bgLight: "bg-sky-500" }
        };

        let dbData = {};

        function initApp() {
            const saved = localStorage.getItem('excel_daily_report_v3');
            if (saved) {
                dbData = JSON.parse(saved);
            } else {
                dbData = {};
            }
            onDateFilterChange();
        }

        function onDateFilterChange() {
            const startStr = document.getElementById('startDate').value;
            const endStr = document.getElementById('endDate').value;

            const d1 = new Date(startStr);
            const d2 = new Date(endStr);
            const diffDays = Math.ceil(Math.abs(d2 - d1) / (1000 * 60 * 60 * 24)) + 1;
            
            document.getElementById('dateDisplayRange').innerHTML = 
                `${startStr.split('-').reverse().join('/')} → ${endStr.split('-').reverse().join('/')} <span class="text-gray-400 font-normal">(${diffDays} ngày)</span>`;

            renderDashboard();
        }

        function renderDashboard() {
            const startStr = document.getElementById('startDate').value;
            const endStr = document.getElementById('endDate').value;
            const searchQuery = document.getElementById('searchDriver').value.toLowerCase();

            let summary = {};
            Object.keys(toMeta).forEach(to => {
                summary[to] = { total: 0, drivers: {}, daysActive: 0 };
            });

            let start = new Date(startStr);
            let end = new Date(endStr);

            for (let d = new Date(start); d <= end; d.setDate(d.getDate() + 1)) {
                let dateStr = d.toISOString().split('T')[0];
                if (dbData[dateStr]) {
                    Object.keys(toMeta).forEach(to => {
                        if (dbData[dateStr][to]) {
                            summary[to].total += dbData[dateStr][to].total;
                            summary[to].daysActive++;
                            
                            Object.keys(dbData[dateStr][to].drivers).forEach(matai => {
                                const dr = dbData[dateStr][to].drivers[matai];
                                if (!summary[to].drivers[matai]) {
                                    summary[to].drivers[matai] = { name: dr.name, val: 0 };
                                }
                                summary[to].drivers[matai].val += dr.val;
                            });
                        }
                    });
                }
            }

            const container = document.getElementById('tab-so-sanh');
            container.innerHTML = '';

            Object.keys(summary).forEach(to => {
                const item = summary[to];
                const meta = toMeta[to];
                const totalDriversInTo = Object.keys(item.drivers).length;

                let driverList = Object.keys(item.drivers).map(code => ({
                    code: code,
                    name: item.drivers[code].name,
                    val: item.drivers[code].val
                }));

                let filtered = driverList.filter(d => d.name.toLowerCase().includes(searchQuery) || d.code.toString().includes(searchQuery));
                filtered.sort((a, b) => b.val - a.val);
                let topDrivers = filtered.slice(0, 4);

                let driverRows = '';
                topDrivers.forEach(dr => {
                    driverRows += `
                        <div class="flex justify-between items-center text-xs py-1 border-b border-gray-50 hover:bg-gray-50">
                            <div class="truncate max-w-[130px]" title="${dr.name}">
                                <span class="text-gray-700 font-medium">${dr.name}</span>
                                <span class="text-gray-400 text-[10px] block">${dr.code}</span>
                            </div>
                            <span class="${meta.textColor} font-semibold">${dr.val.toFixed(2)}M</span>
                        </div>
                    `;
                });

                let activeDays = Math.max(1, item.daysActive / 6);
                let avgDayPerDriver = totalDriversInTo > 0 ? ((item.total * 1000000) / totalDriversInTo / activeDays) : 0;
                let avgPeriodPerDriver = totalDriversInTo > 0 ? (item.total / totalDriversInTo) : 0;

                // Quy đổi hiển thị chữ K cho tiền nghìn
                let avgDayStr = avgDayPerDriver >= 1000 ? (avgDayPerDriver / 1000).toFixed(0) + "K" : avgDayPerDriver.toFixed(0);

                container.innerHTML += `
                    <div class="bg-white rounded-lg shadow-sm border-t-4 ${meta.color} border-x border-b border-gray-200 flex flex-col justify-between">
                        <div class="p-3">
                            <div class="flex justify-between items-center mb-2">
                                <h3 class="font-bold text-base ${meta.textColor}">${to}</h3>
                                <span class="text-[11px] text-gray-400 bg-gray-100 px-1.5 py-0.5 rounded">${totalDriversInTo} TX có DT</span>
                            </div>
                            <div class="space-y-1 mb-3">
                                <div class="flex justify-between text-xs text-gray-500">
                                    <span>Tổng DT kỳ</span>
                                    <span class="font-bold text-gray-800 text-sm">${item.total.toFixed(2)}M</span>
                                </div>
                                <div class="flex justify-between text-xs text-gray-500 pt-1 border-t border-dashed">
                                    <span>TB DT/tài xế/ngày</span>
                                    <span class="font-bold text-gray-800">${avgDayStr}</span>
                                </div>
                                <div class="flex justify-between text-xs text-gray-500">
                                    <span>TB DT/tài xế cả kỳ</span>
                                    <span class="font-bold text-gray-800">${avgPeriodPerDriver.toFixed(2)}M</span>
                                </div>
                            </div>
                            <div class="h-[2px] w-full ${meta.bgLight} opacity-80 mb-2"></div>
                            <div class="space-y-1">
                                ${driverRows || '<p class="text-gray-400 text-center text-xs py-4">Chưa có dữ liệu kỳ này</p>'}
                            </div>
                        </div>
                    </div>
                `;
            });
        }

        function importExcel(event) {
            const file = event.target.files[0];
            if (!file) return;

            const reader = new FileReader();
            reader.onload = function(e) {
                const data = new Uint8Array(e.target.result);
                const workbook = XLSX.read(data, {type: 'array'});
                const worksheet = workbook.Sheets[workbook.SheetNames[0]];
                const jsonData = XLSX.utils.sheet_to_json(worksheet);

                if(jsonData.length === 0) return alert("File Excel rỗng!");

                let importedCount = 0;

                jsonData.forEach(row => {
                    // 1. Xử lý chuẩn hóa ngày từ cột "Bắt đầu ca" hoặc "Ngày phân công"
                    let rawTimeStr = row["Bắt đầu ca"] || row["Ngày phân công"];
                    if(!rawTimeStr) return;
                    
                    let dateStr = "";
                    let timeStrString = rawTimeStr.toString().trim();
                    let datePart = timeStrString.split(" ")[0]; // Lấy phần ngày trước khoảng trắng
                    let parts = datePart.split("/");
                    
                    if(parts.length === 3) {
                        dateStr = `${parts[2]}-${parts[1].padStart(2,'0')}-${parts[0].padStart(2,'0')}`;
                    } else {
                        // Trường hợp định dạng ngày đặc biệt khác
                        let dashParts = datePart.split("-");
                        if(dashParts.length === 3) {
                            dateStr = dashParts[0].length === 4 ? datePart : `${dashParts[2]}-${dashParts[1].padStart(2,'0')}-${dashParts[0].padStart(2,'0')}`;
                        }
                    }

                    if(!dateStr || dateStr.includes("undefined")) return;

                    // 2. Nhận diện Tổ chính xác từ mã chuỗi (VD: OCP.DOIXE06.04 -> Tổ 06)
                    let rawTo = row["Tổ"];
                    if(!rawTo) return;
                    
                    let toName = "";
                    let toMatch = rawTo.toString().match(/DOIXE(\d+)/i); 
                    if(toMatch && toMatch[1]) {
                        toName = "Tổ " + toMatch[1].padStart(2, '0');
                    } else {
                        // Dự phòng nếu ghi chữ thường hoặc cách khác
                        let simpleMatch = rawTo.toString().match(/(\d+)/);
                        if(simpleMatch) toName = "Tổ " + simpleMatch[1].padStart(2, '0');
                    }

                    if (!toName || !toMeta[toName]) return;

                    // 3. Ép kiểu dữ liệu doanh thu loại bỏ mọi lỗi định dạng text chuỗi
                    let rawRevenue = row["Tổng giá trị cước xe hoàn thành"] || row["Doanh thu"] || row["Tổng giá trị cước xe"];
                    let doanhThuRaw = parseFloat(rawRevenue.toString().replace(/[^0-9.-]/g, '')) || 0;
                    let doanhThuTrieu = doanhThuRaw / 1000000;

                    let matai = row["Mã tài xế"] || row["Mã tài"];
                    let tentai = row["Tên tài xế"] || "Tài xế ẩn danh";

                    if(!matai) return;

                    // 4. Đưa vào cấu trúc dữ liệu tổng gộp
                    if (!dbData[dateStr]) dbData[dateStr] = {};
                    if (!dbData[dateStr][toName]) {
                        dbData[dateStr][toName] = { total: 0, drivers: {} };
                    }

                    dbData[dateStr][toName].total += doanhThuTrieu;

                    if (!dbData[dateStr][toName].drivers[matai]) {
                        dbData[dateStr][toName].drivers[matai] = { name: tentai, val: 0 };
                    }
                    dbData[dateStr][toName].drivers[matai].val += doanhThuTrieu;
                    importedCount++;
                });

                localStorage.setItem('excel_daily_report_v3', JSON.stringify(dbData));
                
                // Đặt bộ lọc hiển thị tự động nhảy về ngày của dòng dữ liệu đầu tiên tìm thấy
                if(jsonData.length > 0) {
                    let sampleTime = jsonData[0]["Bắt đầu ca"] || jsonData[0]["Ngày phân công"];
                    if(sampleTime) {
                        let sampleDatePart = sampleTime.toString().trim().split(" ")[0].split("/");
                        if(sampleDatePart.length === 3) {
                            let targetDate = `${sampleDatePart[2]}-${sampleDatePart[1].padStart(2,'0')}-${sampleDatePart[0].padStart(2,'0')}`;
                            document.getElementById('startDate').value = targetDate;
                            document.getElementById('endDate').value = targetDate;
                        }
                    }
                }

                onDateFilterChange();
                alert(`Import thành công dữ liệu của ${importedCount} dòng từ file Excel!`);
                event.target.value = '';
            };
            reader.readAsArrayBuffer(file);
        }

        function setPresetDate(type) {
            if(type === 'today') {
                document.getElementById('startDate').value = "2026-05-26";
                document.getElementById('endDate').value = "2026-05-26";
            } else if(type === 'ky') {
                document.getElementById('startDate').value = "2026-05-01";
                document.getElementById('endDate').value = "2026-05-31";
            }
            onDateFilterChange();
        }

        function resetData() {
            if(confirm("Xóa toàn bộ kho dữ liệu đã tích lũy?")) {
                localStorage.removeItem('excel_daily_report_v3');
                dbData = {};
                renderDashboard();
            }
        }

        function switchTab(btn, tab) {
            document.querySelectorAll('.tab-active').forEach(el => { el.classList.remove('tab-active'); el.classList.add('text-gray-500'); });
            btn.classList.add('tab-active'); btn.classList.remove('text-gray-500');
            document.getElementById('tab-so-sanh').classList.toggle('hidden', tab !== 'so-sanh');
            document.getElementById('tab-so-sanh').classList.toggle('grid', tab === 'so-sanh');
            document.getElementById('tab-other').classList.toggle('hidden', tab === 'so-sanh');
        }

        window.onload = initApp;
    </script>
</body>
</html>
